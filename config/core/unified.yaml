# ========================================
# 環境・構造設定ファイル (unified.yaml)
# ========================================
#
# 目的: 環境・構造設定の統一管理
#       パラメータ・閾値・機能トグルは thresholds.yaml で管理
#
# モード制御: コマンドライン引数 > 環境変数MODE > YAML内mode
#
# 使用方法:
#   開発: python main.py --config config/core/unified.yaml --mode paper
#   本番: python main.py --config config/core/unified.yaml --mode live
#   環境変数: MODE=live python main.py --config config/core/unified.yaml
#
# ========================================

# 動作モード（デフォルト: ペーパートレード）
mode: paper  # paper/live/backtest（環境変数・CLIで上書き可能）

# ========================================
# モード別初期残高設定
# ========================================
mode_balances:
  paper:
    initial_balance: 500000.0
    description: "ペーパートレード用初期残高（50万円）"
  live:
    initial_balance: 500000.0
    description: "ライブトレード用初期残高（50万円）"
  backtest:
    initial_balance: 500000.0
    description: "バックテスト用初期残高（50万円）"

# ========================================
# 取引所設定（bitbank信用取引専用）
# ========================================
exchange:
  name: bitbank
  symbol: BTC/JPY
  leverage: 1.0
  rate_limit_ms: 35000
  timeout_ms: 120000
  retries: 5
  ssl_verify: true
  api_version: v1

# ========================================
# データ取得設定（マルチタイムフレーム）
# ========================================
data:
  timeframes:
    - 15m  # メインタイムフレーム（エントリー判断用）
    - 4h   # 補助タイムフレーム（トレンド判断用）
  since_hours: 96
  limit: 100
  cache_enabled: true
  cache:
    enabled: true
    ttl_minutes: 5
    max_size: 1000
    disk_cache: true
    retention_days: 90

# ========================================
# GCP Cloud Run最適化
# ========================================
cloud_run:
  memory: 1Gi
  cpu: 1
  min_instances: 1
  max_instances: 2
  concurrency: 1
  timeout_seconds: 3600

# ========================================
# セキュリティ設定
# ========================================
security:
  secret_management: gcp_secret_manager
  workload_identity: true

# ========================================
# 取引制約・制限事項
# ========================================
trading_constraints:
  exchange: bitbank
  trading_type: margin
  leverage_max: 2.0
  leverage_actual: 1.0
  currency_pair: BTC/JPY
  default_order_type: limit
  initial_capital: 10000
  target_capital: 500000
  features_count: 55  # 49基本+6戦略シグナル（feature_order.json参照）
  timeframes:
    - 15m
    - 4h
