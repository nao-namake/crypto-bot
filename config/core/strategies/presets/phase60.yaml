# ========================================
# Phase 60 戦略設定プリセット
# ========================================
# Phase 60.4: 分析結果に基づくパラメータ最適化
# 検証日: 2025-12-04
# 目標: PF 1.3以上達成
#
# 変更点:
#   - 高PF戦略（ADXTrendStrength PF1.34, MACDEMACrossover PF1.48）の重み増加
#   - 低PF戦略（StochasticReversal PF0.66, ATRBased PF0.77）の重み削減
#   - BBReversal（勝率63.3%・スコア1位）の重み増加
#   - TP比率改善でRR比向上
# ========================================

version: "phase60"
description: "Phase 60設定 - 分析結果に基づく高PF戦略集中"
tested_date: "2025-12-04"

# パフォーマンス記録（検証後に更新）
performance:
  win_rate: 0.0
  profit_factor: 0.0
  total_pnl: 0
  total_trades: 0
  max_drawdown: 0.0

# ========================================
# レジーム別有効戦略リスト
# ========================================
# Phase 60.4: 高PF戦略を有効化
regime_active_strategies:
  tight_range:
    - ATRBased
    - BBReversal
    - ADXTrendStrength    # Phase 60: PF 1.34追加
    - MACDEMACrossover    # Phase 60: PF 1.48追加
  normal_range:
    - ATRBased
    - BBReversal
    - DonchianChannel
    - ADXTrendStrength
    - MACDEMACrossover
  trending:
    - ADXTrendStrength
    - MACDEMACrossover
    - DonchianChannel
  high_volatility: []

# ========================================
# 戦略重みマッピング
# ========================================
# Phase 60.4: 分析結果に基づく重み最適化
# 高PF: ADXTrendStrength(1.34), MACDEMACrossover(1.48)
# 高勝率: BBReversal(63.3%), ATRBased(57.4%)
# 低PF: StochasticReversal(0.66) - 除外
regime_strategy_mapping:
  tight_range:
    ATRBased: 0.20           # Phase 56: 0.40 → Phase 60: 0.20（PF0.77）
    BBReversal: 0.30         # Phase 56: 0.30 → Phase 60: 0.30（勝率63%維持）
    DonchianChannel: 0.10    # Phase 56: 0.15 → Phase 60: 0.10
    StochasticReversal: 0.0  # Phase 56: 0.15 → Phase 60: 0.0（PF0.66除外）
    ADXTrendStrength: 0.25   # Phase 56: 0.0 → Phase 60: 0.25（PF1.34追加）
    MACDEMACrossover: 0.15   # Phase 56: 0.0 → Phase 60: 0.15（PF1.48追加）
  normal_range:
    ATRBased: 0.20
    BBReversal: 0.25
    DonchianChannel: 0.10
    StochasticReversal: 0.0
    ADXTrendStrength: 0.25
    MACDEMACrossover: 0.20
  trending:
    ADXTrendStrength: 0.45
    MACDEMACrossover: 0.35
    ATRBased: 0.10
    DonchianChannel: 0.10
    BBReversal: 0.0
    StochasticReversal: 0.0
  high_volatility:
    ATRBased: 0.0
    BBReversal: 0.0
    DonchianChannel: 0.0
    StochasticReversal: 0.0
    ADXTrendStrength: 0.0
    MACDEMACrossover: 0.0

# ========================================
# TP/SL設定（レジーム別）
# ========================================
# Phase 60.4: RR比改善でPF向上
take_profit:
  tight_range:
    min_profit_ratio: 0.015    # Phase 56: 1.2% → Phase 60: 1.5%
    default_ratio: 3.0         # Phase 56: 2.4 → Phase 60: 3.0（RR比3:1）
  normal_range:
    min_profit_ratio: 0.018    # Phase 56: 1.5% → Phase 60: 1.8%
    default_ratio: 3.0         # Phase 56: 2.5 → Phase 60: 3.0
  trending:
    min_profit_ratio: 0.020    # Phase 56: 1.5% → Phase 60: 2.0%
    default_ratio: 2.0         # Phase 56: 1.5 → Phase 60: 2.0
  high_volatility:
    min_profit_ratio: 0.030    # Phase 56: 2.5% → Phase 60: 3.0%
    default_ratio: 2.0

stop_loss:
  tight_range:
    max_loss_ratio: 0.005      # SL 0.5%維持
  normal_range:
    max_loss_ratio: 0.006      # SL 0.6%維持
  trending:
    max_loss_ratio: 0.010      # SL 1.0%維持
  high_volatility:
    max_loss_ratio: 0.015      # SL 1.5%維持

# ========================================
# ML統合設定
# ========================================
# Phase 60: ML・戦略不一致時のペナルティ緩和
ml_integration:
  hold_conversion_threshold: 0.18    # Phase 56: 0.20 → Phase 60: 0.18（エントリー率向上）
  min_ml_confidence: 0.30            # Phase 56: 0.35 → Phase 60: 0.30
  high_confidence_threshold: 0.50    # Phase 56: 0.55 → Phase 60: 0.50
  disagreement_penalty: 0.95         # Phase 56: 0.90 → Phase 60: 0.95（ペナルティ緩和）
  ml_weight: 0.25                    # Phase 56: 0.30 → Phase 60: 0.25（戦略重視）
  strategy_weight: 0.75              # Phase 56: 0.70 → Phase 60: 0.75
  agreement_bonus: 1.15              # Phase 56: 1.2 → Phase 60: 1.15

# レジーム別ML統合
regime_ml_integration:
  tight_range:
    min_ml_confidence: 0.25          # Phase 56: 0.30 → Phase 60: 0.25
    high_confidence_threshold: 0.40  # Phase 56: 0.45 → Phase 60: 0.40
    ml_weight: 0.25
    strategy_weight: 0.75
    agreement_bonus: 1.20
    disagreement_penalty: 0.95       # Phase 56: 0.98 → Phase 60: 0.95
  normal_range:
    min_ml_confidence: 0.30
    high_confidence_threshold: 0.40
    ml_weight: 0.25
    strategy_weight: 0.75
    agreement_bonus: 1.20
    disagreement_penalty: 0.95
  trending:
    min_ml_confidence: 0.30
    high_confidence_threshold: 0.40
    ml_weight: 0.30
    strategy_weight: 0.70
    agreement_bonus: 1.20
    disagreement_penalty: 0.92

# ========================================
# 信頼度レベル
# ========================================
confidence_levels:
  high: 0.35
  medium: 0.18
  low: 0.15
  min_ml: 0.12
  very_high: 0.50                    # Phase 56: 0.55 → Phase 60: 0.50

# ========================================
# 戦略パラメータ
# ========================================
# Phase 60: 高PF戦略の閾値調整
strategies:
  atr_based:
    hold_confidence: 0.10
    min_confidence: 0.30             # Phase 56: 0.25 → Phase 60: 0.30（勝率重視）
    bb_overbought: 0.7
    bb_oversold: 0.3
    rsi_overbought: 70               # Phase 56: 65 → Phase 60: 70
    rsi_oversold: 30                 # Phase 56: 35 → Phase 60: 30

  bb_reversal:
    hold_confidence: 0.25
    min_confidence: 0.25             # Phase 56: 0.30 → Phase 60: 0.25（発火率向上）
    bb_width_threshold: 0.025
    rsi_overbought: 70               # Phase 56: 65 → Phase 60: 70
    rsi_oversold: 30                 # Phase 56: 35 → Phase 60: 30
    bb_upper_threshold: 0.85
    bb_lower_threshold: 0.15
    adx_range_threshold: 40          # Phase 56: 35 → Phase 60: 40（レンジ範囲拡大）
    sl_multiplier: 1.5

  stochastic_reversal:
    # Phase 60: 除外（PF 0.66で低性能）
    hold_confidence: 0.50            # Phase 56: 0.25 → Phase 60: 0.50（HOLD率増加）
    min_confidence: 0.40             # Phase 56: 0.30 → Phase 60: 0.40（発火抑制）
    stoch_overbought: 75
    stoch_oversold: 25
    rsi_overbought: 60
    rsi_oversold: 40
    adx_range_threshold: 35
    sl_multiplier: 1.5

  donchian_channel:
    hold_confidence: 0.40
    min_confidence: 0.30             # Phase 56: 0.25 → Phase 60: 0.30
    middle_zone_min: 0.40
    middle_zone_max: 0.60
    reversal_threshold: 0.10
    weak_signal_confidence: 0.35
    weak_signal_max: 0.70

  adx_trend:
    hold_confidence: 0.35            # Phase 56: 0.45 → Phase 60: 0.35（発火率向上）
    min_confidence: 0.20             # Phase 56: 0.25 → Phase 60: 0.20
    di_crossover_threshold: 0.5
    strong_trend_threshold: 25
    moderate_trend_min: 15
    moderate_trend_max: 25
    weak_trend_threshold: 15

  macd_ema_crossover:
    hold_confidence: 0.20            # Phase 56: 0.25 → Phase 60: 0.20（発火率向上）
    min_confidence: 0.30             # Phase 56: 0.35 → Phase 60: 0.30
    adx_trend_threshold: 25
    volume_ratio_threshold: 1.1
    sl_multiplier: 1.5

# ========================================
# レジーム判定閾値
# ========================================
market_regime:
  tight_range:
    bb_width_threshold: 0.03
    price_range_threshold: 0.02
  normal_range:
    bb_width_threshold: 0.05
    adx_threshold: 20
  trending:
    adx_threshold: 25
    ema_slope_threshold: 0.01
  high_volatility:
    atr_ratio_threshold: 0.018
