# ========================================
# 戦略プリセット選択ファイル (active.yaml)
# ========================================
# Phase 57.5: 戦略設定の変数化システム導入
#
# 機能:
#   - active_presetでどのプリセットを使用するか選択
#   - aliasesで変数名（A, B, C）からプリセット名をマッピング
#   - ロールバック: このファイルのactive_presetを変更するだけ
#
# 使用方法:
#   - active_presetを変更 → システム再起動でプリセット適用
#   - 新規プリセット追加: presets/xxx.yamlを作成してaliasesに登録
# ========================================

# 現在アクティブなプリセット
# 選択肢: phase56 | phase57_4 | custom
active_preset: phase56

# ========================================
# プリセットエイリアス（A, B, C形式）
# ========================================
# 将来のレジーム別組み合わせ機能で使用
aliases:
  A: phase56       # 勝率42.1%・PF 1.17・検証済み・推奨
  B: phase57_4     # 勝率21%・発火率重視・非推奨

# ========================================
# 組み合わせテスト用（将来拡張）
# ========================================
# combination_mode: trueにするとcombinationsの設定が有効化
# レジーム別に異なるプリセットを適用可能
combination_mode: false
combinations:
  tight_range: A
  normal_range: A
  trending: A
  high_volatility: A
