# ========================================
# 動的閾値設定ファイル (thresholds.yaml)
# ========================================
# 目的: ML統合・リスク管理・戦略パラメータの動的閾値一元管理
#
# このファイルの役割:
#   1. ML統合パラメータ（信頼度閾値・重み・ボーナス/ペナルティ）
#   2. 動的信頼度計算（市場不確実性調整・戦略別信頼度範囲）
#   3. 戦略パラメータ（5戦略の閾値・信頼度計算）
#   4. リスク管理設定（Kelly基準・ドローダウン・証拠金維持率）
#   5. ポジション管理設定（TP/SL・緊急決済）
#   6. Optuna最適化パラメータ（Phase 40最適化結果）
#
# 設定ファイル分離:
#   - features.yaml: 機能オンオフ
#   - unified.yaml: 基本設定（exchange、mode等）
#   - thresholds.yaml: 動的閾値（このファイル）
#   - feature_order.json: 特徴量定義
#
# 使用方法:
#   - get_threshold()関数で動的に参照（ハードコード禁止）
#   - Optuna最適化: scripts/optimization/run_phase40_optimization.py
#
# ========================================

# ========================================
# 実行設定（Execution Settings）
# ========================================
execution:
  backtest_period_days: 180  # Phase 51.8-10: フル期間バックテスト（理論的設定値検証）
  live_mode_interval_seconds: 300
  paper_mode_interval_seconds: 300
  backtest_mode_interval_seconds: 1  # Phase 52.4: バックテスト実行間隔（秒）

# ========================================
# バックテスト設定（Backtest Settings）
# ========================================
backtest:
  log_level: WARNING
  discord_enabled: false
  data_limit: 10000  # Phase 52.4: サンプル数上限（10,000件で停止）
  progress_interval: 100  # Phase 52.4: 進捗表示間隔（100件毎）
  progress_report_percentage: 10  # Phase 52.4: 進捗報告間隔（%）
  strategy_signal_min_data_rows: 20  # Phase 52.4: 戦略シグナル計算最小データ行数
  report_interval: 10000
  mock_api_calls: true
  enable_detailed_logging: false
  fast_data_slicing: true
  data_sampling_ratio: 1.0  # Phase 52.4: 全データ使用（backtest_period_daysで期間制限）
  inner_loop_count: 1  # Phase 52.4: 高速化（1回実行・約40分）

# ========================================
# 🤖 ML統合設定（ML Integration Settings）
# ========================================
# Phase 52.4: 3段階統合ロジック・ML統合率100%達成
# ========================================
ml:
  confidence_threshold: 0.3
  allow_dummy_fallback: false
  default_confidence: 0.5
  strategy_integration:
    enabled: true
    ml_weight: 0.35
    strategy_weight: 0.7
    high_confidence_threshold: 0.6
    agreement_bonus: 1.2
    disagreement_penalty: 0.90  # Phase 52.4: ペナルティ緩和
    min_ml_confidence: 0.35      # Phase 52.4: 閾値緩和
    hold_conversion_threshold: 0.20  # Phase 55.4: 0.30→0.20（エントリー機会増加）
  # Meta-Learning動的重み最適化システム
  meta_learning:
    enabled: false  # デフォルト無効（慎重な段階的有効化）
    model_path: "models/meta_learning/meta_model.pkl"
    # フォールバック固定重み（Meta-ML失敗時使用）
    fallback_ml_weight: 0.35
    fallback_strategy_weight: 0.7

  # ========================================
  # Phase 52.4: レジーム別ML統合設定
  # ========================================
  # バックテスト最適化: tight_range（99.4%寄与）・normal_range（0.6%）・trending（未発生）
  #
  # Phase 52.5: 使用箇所
  # 使用箇所:
  #   - src/core/services/trading_cycle_manager.py (Lines 677, 680)
  #   - src/core/config/config_classes.py (Line 63)
  #   - src/ml/ensemble.py (get_regime_config)
  # ========================================
  regime_ml_integration:
    enabled: true  # Phase 52.4: レジーム別ML統合有効化

    # tight_range（狭いレンジ）: 戦略重視型
    # バックテスト結果: 1,380件（91.8%）、PF=1.065、利益寄与99.4%
    # Phase 55.4: ML統合緩和（エントリー率向上）
    tight_range:
      min_ml_confidence: 0.35           # Phase 55.4: 0.40→0.35（緩和）
      high_confidence_threshold: 0.65
      ml_weight: 0.30                   # Phase 55.3: 0.25→0.30（ML重視化）
      strategy_weight: 0.70             # Phase 55.3: 0.75→0.70（戦略重視から均衡へ）
      agreement_bonus: 1.15             # ML・戦略一致時ボーナス控えめ
      disagreement_penalty: 0.98        # Phase 55.4: 0.95→0.98（ペナルティ緩和）

    # normal_range（通常レンジ）: バランス型
    # バックテスト結果: 124件（8.2%）、PF=1.005、利益寄与0.6%
    normal_range:
      min_ml_confidence: 0.40           # 中閾値（バランス型）
      high_confidence_threshold: 0.60
      ml_weight: 0.30                   # ML 30%
      strategy_weight: 0.70             # 戦略 70%
      agreement_bonus: 1.20             # ML・戦略一致時ボーナス標準
      disagreement_penalty: 0.90        # ML・戦略不一致時ペナルティ標準

    # trending（トレンド）: ML補完重視型
    # バックテスト結果: 0件（未発生・実験的設定）
    trending:
      min_ml_confidence: 0.35           # 低閾値（ML補完重視）
      high_confidence_threshold: 0.55
      ml_weight: 0.35                   # ML 35%
      strategy_weight: 0.65             # 戦略 65%
      agreement_bonus: 1.25             # ML・戦略一致時ボーナス強化
      disagreement_penalty: 0.88        # ML・戦略不一致時ペナルティやや強化

    # high_volatility（高ボラティリティ）: 超保守型
    # バックテスト結果: 0件（エントリー禁止）
    high_volatility:
      min_ml_confidence: 0.80           # 超高閾値（実質エントリーなし）
      high_confidence_threshold: 0.90
      ml_weight: 0.10                   # ML 10%
      strategy_weight: 0.90             # 戦略 90%
      agreement_bonus: 1.10             # ボーナス最小
      disagreement_penalty: 0.85        # ペナルティ最強化

  # Meta-ML予測信頼度閾値
  min_confidence: 0.3
  # 市場状況特徴量設定
  market_features:
    # ボラティリティ関連
    atr_window: 14
    bb_window: 20
    volatility_ratio_window: 7
    # トレンド関連
    ema_short: 20
    ema_long: 50
    adx_window: 14
    trend_strength_threshold: 0.5
    # レンジ判定関連
    donchian_window: 20
    range_threshold: 0.02
  # パフォーマンストラッキング設定
  performance_tracking:
    window_days_short: 7
    window_days_long: 30
    min_trades_required: 5
    history_file: "src/core/state/performance_history.json"
  # Meta-MLモデル設定
  model_config:
    n_estimators: 100
    learning_rate: 0.05
    max_depth: 5
    random_state: 42
  dynamic_confidence:
    base_hold: 0.20  # Phase 55.2: 0.35 → 0.20（HOLD優勢化防止）
    error_fallback: 0.25
    ml_fallback: 0.35
    neutral_default: 0.4
    strategy_fallback: 0.35
    market_uncertainty:
      volatility_factor_max: 0.1
      volatility_divisor: 1.0
      volume_factor_max: 0.06
      volume_multiplier: 0.2
      price_factor_max: 0.04
      uncertainty_max: 0.2
      uncertainty_boost: 1.0
    strategies:
      # DonchianChannel戦略動的信頼度設定
      donchian_channel:
        breakout_base: 0.6
        breakout_min: 0.3
        breakout_max: 0.85
        reversal_base: 0.5
        reversal_min: 0.3
        reversal_max: 0.7
        hold_base: 0.4
        hold_min: 0.35
        hold_max: 0.6
        volume_bonus_max: 0.1
        volume_multiplier: 0.2

      # ADXTrend戦略動的信頼度設定
      adx_trend:
        strong_base: 0.65
        strong_min: 0.4
        strong_max: 0.85
        moderate_base: 0.5
        moderate_min: 0.35
        moderate_max: 0.7
        weak_base: 0.35
        weak_min: 0.25
        weak_max: 0.5
        hold_base: 0.45
        hold_min: 0.35
        hold_max: 0.6
        default_min: 0.25
        default_max: 0.6
        adx_bonus_max: 0.25
        adx_divisor: 25
        di_bonus_max: 0.15
        di_divisor: 12
        volume_bonus_max: 0.1
        volume_multiplier: 0.15

      # ATRBased戦略動的信頼度設定
      atr_based:
        high_volatility_base: 0.55
        high_volatility_min: 0.35
        high_volatility_max: 0.8
        normal_volatility_base: 0.45
        normal_volatility_min: 0.3
        normal_volatility_max: 0.65
        low_volatility_base: 0.35
        low_volatility_min: 0.25
        low_volatility_max: 0.5
        rsi_base: 0.2
        rsi_multiplier: 0.3
        agreement_max: 0.85
        weak_base: 0.08
        weak_multiplier: 0.1
        volatility_bonus: 1.02
        volatility_max: 0.85
        position_size_base: 0.015       # ML訓練で参照
        market_stress_threshold: 0.7
        min_atr_ratio: 0.5
        strength_divisor: 0.2
        strength_normalize: 30.0
  emergency_stop_on_dummy: true
  max_model_failures: 3
  prediction_fallback_confidence: 0.0
  dummy_confidence: 0.5
  model_paths:
    base_path: /app
    local_path: .
    training_path: models/training

# ========================================
# 📊 市場レジーム分類設定（Market Regime Classification）
# ========================================
# Phase 52.4: 市場状況4段階分類パラメータ（tight_range/normal_range/trending/high_volatility）
#
# Phase 52.5: 使用箇所
# 使用箇所:
#   - src/core/services/market_regime_classifier.py (classify_regime)
#   - src/core/services/trading_cycle_manager.py
# ========================================
market_regime:
  # レンジ判定閾値
  tight_range:
    bb_width_threshold: 0.03        # BB幅閾値（3%未満で狭いレンジ）
    price_range_threshold: 0.02     # 価格変動閾値（2%未満で狭いレンジ）
  normal_range:
    bb_width_threshold: 0.05        # BB幅閾値（5%未満で通常レンジ）
    adx_threshold: 20               # ADX閾値（20未満で通常レンジ）
  # トレンド判定閾値
  trending:
    adx_threshold: 25               # ADX閾値（25超でトレンド）
    ema_slope_threshold: 0.01       # EMA傾き閾値（1%超でトレンド）
  # 高ボラティリティ判定閾値
  high_volatility:
    atr_ratio_threshold: 0.018      # ATR比閾値（1.8%超で高ボラ）
  # 計算期間パラメータ
  periods:
    bb_period: 20                   # ボリンジャーバンド期間
    donchian_period: 20             # Donchianチャネル期間
    ema_period: 20                  # EMA期間
    ema_lookback: 5                 # EMA傾き計算参照期間
    price_range_lookback: 20        # 価格変動率計算参照期間

# ========================================
# 🔧 サービス層設定（Services Layer Settings）
# ========================================
# Phase 52.4: 取引サイクル・システム復旧・ヘルスチェック設定
# ========================================
services:
  # 取引サイクル設定
  trading_cycle:
    max_retries: 3                  # 最大リトライ回数
    retry_delay: 5                  # リトライ遅延（秒）
    validation_timeout: 30          # 検証タイムアウト（秒）
  # システム復旧設定
  system_recovery:
    max_recovery_attempts: 3        # 最大復旧試行回数
    recovery_delay: 10              # 復旧遅延（秒）
  # Gracefulシャットダウン設定
  graceful_shutdown:
    timeout_seconds: 30             # シャットダウンタイムアウト（秒）
  # ヘルスチェック設定
  health_checker:
    check_interval: 60              # ヘルスチェック間隔（秒）
    cpu_threshold_percent: 80       # CPU使用率閾値（%）
    memory_threshold_percent: 80    # メモリ使用率閾値（%）

# ========================================
# 📊 動的信頼度計算（Dynamic Confidence Calculation）
# ========================================
# 市場不確実性に基づく信頼度調整・戦略別信頼度範囲設定
# ========================================
performance:
  default_latency_ms: 100.0

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# 🎯 動的戦略選択設定（Dynamic Strategy Selection）
# ========================================
# Phase 55: 完全フィルタリング方式による戦略システム改修
# - レジーム別に3戦略のみ有効化（6戦略から絞り込み）
# - 重み付け方式から完全フィルタリング方式に移行
#
# Phase 55: 使用箇所
# 使用箇所:
#   - src/core/services/dynamic_strategy_selector.py (apply_regime_strategy_filter)
#   - src/core/services/trading_cycle_manager.py
#   - src/strategies/base/strategy_manager.py
# ========================================
dynamic_strategy_selection:
  enabled: true  # Phase 52.4: レジーム別戦略重み最適化有効化

  # ========================================
  # Phase 55: レジーム別有効戦略リスト（完全フィルタリング方式）
  # ========================================
  # 設計思想:
  #   - 各レジームで3戦略のみ有効化（残りは完全無効化）
  #   - enable()/disable()メソッドで戦略を切り替え
  #   - 無効な戦略はシグナル生成に参加しない
  #
  # 戦略選定根拠:
  #   - バックテスト結果: tight_range 91.8%, normal_range 8.2%, trending 0%
  #   - 現実的にはレンジ相場がほぼ全てのため、レンジ型戦略を重視
  # ========================================
  regime_active_strategies:
    # tight_range（狭いレンジ相場）: レンジ型＋逆張り系
    # ATR=ボラティリティ基準、BB/Stoch=逆張り系で相性◎
    tight_range:
      - ATRBased
      - BBReversal
      - StochasticReversal

    # normal_range（通常レンジ相場）: レンジ型＋ブレイクアウト検出
    # ATR/BB=レンジ型中心、Donchian=ブレイクアウト検出
    normal_range:
      - ATRBased
      - BBReversal
      - DonchianChannel

    # trending（トレンド相場）: トレンド追従＋ブレイクアウト確認
    # ADX/MACD=トレンド追従、Donchian=ブレイクアウト確認
    trending:
      - ADXTrendStrength
      - MACDEMACrossover
      - DonchianChannel

    # high_volatility（高ボラティリティ）: 完全待機
    # 全戦略無効化でリスク回避
    high_volatility: []
  # レジーム別戦略重みマッピング
  regime_strategy_mapping:
    tight_range:  # 狭いレンジ相場（BB幅 < 3%, 価格変動 < 2%）
      # Phase 55.3: レンジ型戦略100%・4戦略有効化（DonchianChannel再有効化）
      ATRBased: 0.40           # 0.45→0.40（-5%）
      BBReversal: 0.30         # 0.35→0.30（-5%）
      DonchianChannel: 0.15    # 0.10→0.15（+5%・再有効化）
      StochasticReversal: 0.15 # 0.10→0.15（+5%・モメンタム強化）
      ADXTrendStrength: 0.0
      MACDEMACrossover: 0.0
    normal_range:  # 通常レンジ相場（BB幅 < 5%, ADX < 20）
      # バランス型70/20配分
      ATRBased: 0.35
      BBReversal: 0.20
      DonchianChannel: 0.10
      StochasticReversal: 0.15
      ADXTrendStrength: 0.15
      MACDEMACrossover: 0.05
    trending:  # トレンド相場（ADX > 25, EMA傾き > 1%）
      # トレンド型80/20配分
      ADXTrendStrength: 0.50
      MACDEMACrossover: 0.30
      ATRBased: 0.15
      DonchianChannel: 0.05
      BBReversal: 0.0
      StochasticReversal: 0.0
    high_volatility:  # 高ボラティリティ（ATR比 > 1.8%・4時間足）
      # 全戦略無効化（完全待機モード）
      ATRBased: 0.0
      BBReversal: 0.0
      DonchianChannel: 0.0
      StochasticReversal: 0.0
      ADXTrendStrength: 0.0
      MACDEMACrossover: 0.0

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# 📊 レジーム別ポジション制限設定（Regime-Based Position Limits）
# ========================================
# Phase 52.4: レジーム別最大ポジション数制限（6件→4件→2件→0件）
# ========================================
position_limits:
  tight_range:
    max_positions: 6      # 分散投資最大化
  normal_range:
    max_positions: 4      # バランス型
  trending:
    max_positions: 2      # 集中投資
  high_volatility:
    max_positions: 0      # 完全待機
  # エラーフォールバック設定
  fallback_max_positions: 2    # レジーム情報取得失敗時のデフォルト値
  reject_on_limit: true         # 制限超過時は新規エントリー拒否

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# 🎯 戦略パラメータ（Strategy Parameters）
# ========================================
# Phase 52.4: 6戦略閾値・信頼度計算設定
# ========================================
strategies:
  adx_trend:
    di_crossover_threshold: 0.5
    di_weak_signal_confidence: 0.35
    hold_confidence: 0.45
    min_confidence: 0.25
    moderate_trend_max: 25
    moderate_trend_min: 15
    strong_trend_threshold: 25
    weak_di_threshold: 1.0
    weak_trend_threshold: 15
  atr_based:
    bb_overbought: 0.7
    bb_oversold: 0.3
    high_volatility_strength: 0.5
    hold_confidence: 0.15
    low_volatility_strength: 0.2
    min_confidence: 0.25
    normal_volatility_strength: 0.25
    rsi_overbought: 65
    rsi_oversold: 35
    strength_fallback: 0.3
    base_confidence: 0.25
    confidence_multiplier: 0.3
  donchian_channel:
    breakout_threshold: 0.002
    hold_confidence: 0.4
    middle_zone_max: 0.6
    middle_zone_min: 0.4
    min_confidence: 0.25
    reversal_threshold: 0.05
    weak_signal_confidence: 0.35
    weak_signal_max: 0.75
    weak_signal_min: 0.25
  bb_reversal:
    # Phase 52.4: BB Reversal戦略設定
    min_confidence: 0.30
    hold_confidence: 0.25
    bb_width_threshold: 0.02        # BB幅閾値（2% = レンジ相場判定）
    rsi_overbought: 70              # RSI買われすぎ閾値
    rsi_oversold: 30                # RSI売られすぎ閾値
    bb_upper_threshold: 0.95        # BB上限タッチ閾値（95%以上）
    bb_lower_threshold: 0.05        # BB下限タッチ閾値（5%以下）
    adx_range_threshold: 20         # ADXレンジ相場閾値（20未満）
    sl_multiplier: 1.5              # SL ATR倍率（レンジ相場用）
  stochastic_reversal:
    # Phase 52.4: Stochastic Reversal戦略設定
    min_confidence: 0.30
    hold_confidence: 0.25
    stoch_overbought: 80            # Stochastic過買い閾値
    stoch_oversold: 20              # Stochastic過売り閾値
    rsi_overbought: 65              # RSI買われすぎ閾値
    rsi_oversold: 35                # RSI売られすぎ閾値
    adx_range_threshold: 20         # ADXレンジ相場閾値（20未満）
    sl_multiplier: 1.5              # SL ATR倍率（レンジ相場用）
  macd_ema_crossover:
    # Phase 52.4: MACD + EMA Crossover戦略設定
    min_confidence: 0.35
    hold_confidence: 0.25
    adx_trend_threshold: 25         # ADXトレンド相場閾値（25以上）
    volume_ratio_threshold: 1.1     # 出来高増加閾値
    macd_strong_threshold: 50000    # MACD強い閾値（ヒストグラム正規化用）
    ema_divergence_threshold: 0.01  # EMA乖離度閾値（1%）
    sl_multiplier: 1.5              # SL ATR倍率（トレンド相場用）

# ========================================
# 💹 取引設定（Trading Settings）
# ========================================
# 取引実行・信頼度レベル・Kelly基準設定
# ========================================
trading:
  anomaly:
    spread_critical_threshold: 0.005
    spread_warning_threshold: 0.003
  ask_spread_ratio: 1.001
  bid_spread_ratio: 0.999
  # ========================================
  # Phase 55: 信頼度閾値の最適化
  # ========================================
  # 変更理由: 3戦略に絞ることで信頼度が低下するため、大幅緩和を実施
  # Before: 1 BUY + 5 HOLD → BUY信頼度 0.18 vs HOLD 0.305 → HOLD選択
  # After:  1 BUY + 2 HOLD → BUY信頼度 0.20 vs HOLD 0.155 → BUY選択
  # ========================================
  confidence_levels:
    high: 0.35         # Phase 55: 0.45 → 0.35（大幅緩和・エントリー率向上）
    low: 0.15          # Phase 55.4: 0.18 → 0.15（さらに緩和）
    medium: 0.18       # Phase 55.4: 0.22 → 0.18（さらに緩和）
    min_ml: 0.12       # 維持
    very_high: 0.55    # Phase 55: 0.60 → 0.55（高信頼度も緩和）
  fallback_btc_jpy: 16500000.0
  fallback_prices:
    ask: 16600000.0
    bid: 16400000.0
    default_ask: 16100000.0
    default_bid: 15900000.0
  kelly_criterion:
    min_trades_for_kelly: 5
    max_position_ratio: 0.03
    safety_factor: 0.7
  min_trade_size: 0.0001
  initial_position_size: 0.0001
  fee_rate: 0.0012
  minimum_live_balance: 3000
  position_sizing:
    max_position_ratio: 0.05
    stop_loss_atr_multiplier: 1.2
    stop_loss_rate: 0.02
    take_profit_rate: 0.04
    take_profit_ratio: 2.0
  risk_thresholds:
    conditional: 0.65
    deny: 0.85
    min_ml_confidence: 0.12
  stats_log_interval: 10

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# ライブトレード設定（Live Trading Settings）
# Phase 52.4: ライブモード専用設定
# ========================================
live:
  progress_log_cycle_interval: 50  # 進捗ログ出力サイクル間隔

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# 🧠 アンサンブルモデル設定（Ensemble Model Settings）
# ========================================
ensemble:
  max_nan_ratio_features: 0.5
  max_nan_ratio_target: 0.3
  min_training_samples: 50

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# 📈 MLモデル設定（ML Model Settings）
# ========================================
# LightGBM・XGBoost・RandomForestハイパーパラメータ
# ========================================
models:
  lgbm:
    num_leaves: 31
    learning_rate: 0.05
    n_estimators: 100
    feature_fraction: 0.9
    bagging_fraction: 0.8
    bagging_freq: 5
    max_depth: -1
    min_child_samples: 20
    reg_alpha: 0.0
    reg_lambda: 0.0
  min_training_samples: 10
  rf:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    max_features: sqrt
    bootstrap: true
    oob_score: true
    class_weight: balanced
  xgb:
    max_depth: 6
    learning_rate: 0.05
    n_estimators: 100
    min_child_weight: 1
    subsample: 0.8
    colsample_bytree: 0.8
    alpha: 0
    lambda: 1
    gamma: 0

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# 📊 レポート設定（Reporting Settings）
# ========================================
reporting:
  base_dir: logs/reports
  paper_trading_dir: logs/paper_trading_reports
  discord:
    colors:
      info: 0x3498DB      # Blue - 情報通知
      warning: 0xF39C12   # Orange - 警告通知
      critical: 0xE74C3C  # Red - 重要通知
      success: 0x00FF00   # Green - 成功通知
      error: 0xFF0000     # Red - エラー通知
    validation:
      url_min_length: 50          # Webhook URL最小長
      webhook_id_min: 18          # Webhook ID最小桁数
      webhook_id_max: 19          # Webhook ID最大桁数
      token_min_length: 3         # Token最小長
    timeouts:
      file_upload_seconds: 30     # ファイル送信タイムアウト（秒）

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# ⚖️ リスク管理設定（Risk Management Settings）
# ========================================
# Phase 52.4: Kelly基準・ドローダウン・TP/SL再計算フォールバック
# ========================================
risk:
  emergency_ratio: 0.005
  emergency_stop_ratio: 0.98
  fallback_max_ratio: 0.1
  fallback_min_ratio: 0.01
  fallback_stop_ratio: 0.95
  kelly_lookback_days: 30
  recent_lookback_hours: 24
  safe_balance_ratio: 0.3
  max_capital_usage: 0.3
  reserve_ratio: 0.7

  # Phase 52.4: TP/SL再計算フォールバック設定
  fallback_atr: 500000                   # ATR取得失敗時（500,000円）
  require_tpsl_recalculation: true       # TP/SL再計算必須化

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# 📈 ポジション管理設定（Position Management Settings）
# ========================================
# Phase 52.4: TP/SL最適化（SL 0.7%・TP 0.9%・RR比1.29:1）・証拠金維持率80%遵守
#
# Phase 52.5: 使用箇所
# 使用箇所:
#   - take_profit/stop_loss: src/trading/execution/tp_sl_calculator.py
#   - max_open_positions: src/trading/position/limits.py (Line 131)
#   - fallback_position_size: src/trading/risk/sizer.py (Line 118)
#   - confidence_thresholds: src/trading/position/limits.py (Lines 325-342)
# ========================================
position_management:
  # 個別TP/SL実装
  min_account_balance: 10000
  max_open_positions: 3
  max_daily_trades: 50
  cooldown_minutes: 5  # Phase 55.2: 15 → 5（エントリー機会+50%）
  min_trade_size: 0.0001
  # Phase 52.4-B: ポジションサイジングエラー時フォールバック値（sizer.py Line 118）
  fallback_position_size: 0.01
  # Phase 52.4: ML信頼度判定閾値（limits.py Lines 325-342のハードコード削除）
  confidence_thresholds:
    low_to_medium: 0.60    # 0.60未満: 低信頼度
    medium_to_high: 0.75   # 0.75未満: 中信頼度・0.75以上: 高信頼度

  max_position_ratio_per_trade:
    low_confidence: 0.03
    medium_confidence: 0.05
    high_confidence: 0.1
    enforce_minimum: true
  dynamic_position_sizing:
    enabled: true
    low_confidence:
      min_ratio: 0.01
      max_ratio: 0.03
    medium_confidence:
      min_ratio: 0.03
      max_ratio: 0.05
    high_confidence:
      min_ratio: 0.05
      max_ratio: 0.1
  account_size_adjustments:
    small:
      threshold: 50000
      min_trade_override: true
    medium:
      threshold: 100000
      position_multiplier: 1.0
    large:
      threshold: 100001
      position_multiplier: 1.0
  emergency_stop_loss:
    enable: true
    price_change_threshold: 0.03
    time_window_minutes: 5
    max_loss_threshold: 0.05
    override_cooldown: true
    min_hold_minutes: 1
  take_profit:
    enabled: true
    default_ratio: 1.6               # Phase 55.4: RR比1.6:1（TP 0.8% / SL 0.5%）
    min_profit_ratio: 0.008          # Phase 55.4: TP 0.8%（勝率優先）
    override_strategy_tp: false
    position_partial_exit: false

    # Phase 55.4: レジーム別TP設定（0.8%→1.5%→2.0%→2.5%）
    regime_based:
      enabled: true
      tight_range:
        min_profit_ratio: 0.008      # TP 0.8%（RR比1.6:1）Phase 55.4: 1.2%→0.8%
        default_ratio: 1.6
      normal_range:
        min_profit_ratio: 0.015      # TP 1.5%（RR比2.5:1）Phase 55.3: 1.0%→1.5%
        default_ratio: 2.5
      trending:
        min_profit_ratio: 0.020      # TP 2.0%（RR比2.0:1）Phase 55.3: 1.5%→2.0%
        default_ratio: 2.0
      high_volatility:
        min_profit_ratio: 0.025      # TP 2.5%（参考値・実際はエントリーなし）
        default_ratio: 1.67

  # Phase 52.4-B: 古い注文クリーンアップ設定
  cleanup:
    max_age_hours: 24                # 24時間以上の古い注文を削除対象
    threshold_count: 25              # bitbank API 30件制限対策（25件で警告）

  stop_loss:
    enabled: true
    default_atr_multiplier: 2.0
    max_loss_ratio: 0.005            # Phase 55.3: SL 0.5%（RR比2.4:1で黒字化）
    override_strategy_sl: false
    enable_trailing: false
    execution_slippage: 0.003

    # Phase 55.3: レジーム別SL設定（0.5%→0.6%→1.0%→1.5%）- RR比2.4:1統一
    regime_based:
      enabled: true
      tight_range:
        max_loss_ratio: 0.005        # SL 0.5%（RR比2.4:1）Phase 55.3: 0.6%→0.5%
      normal_range:
        max_loss_ratio: 0.006        # SL 0.6%（RR比2.5:1）Phase 55.3: 0.7%→0.6%
      trending:
        max_loss_ratio: 0.010        # SL 1.0%（RR比2.0:1）維持
      high_volatility:
        max_loss_ratio: 0.015        # SL 1.5%（参考値・実際はエントリーなし）

    adaptive_atr:
      enabled: true
      use_15m_timeframe: true
      volatility_lookback: 20
      low_volatility:
        threshold_ratio: 0.7
        multiplier: 2.5
      normal_volatility:
        multiplier: 2.0
      high_volatility:
        threshold_ratio: 1.3
        multiplier: 1.5
    min_distance:
      enabled: true
      ratio: 0.007               # Phase 52.4: SL 0.7%
      override_atr: false
      min_atr_multiplier: 1.5
    trailing:
      enabled: false
      activation_profit: 0.02
      trailing_percent: 0.03
      min_update_distance: 200
      min_profit_lock: 0.005
      cancel_tp_when_exceeds: true

# ================================================================================
# Phase 52.5: セクション区切り（視覚的整理）
# ================================================================================

# ========================================
# 💰 証拠金管理設定（Margin Management Settings）
