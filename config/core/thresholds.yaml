strategy_system_version: 2.0.0
mode: paper
mode_balances:
  paper:
    initial_balance: 500000.0
    description: ペーパートレード用初期残高（50万円）
  live:
    initial_balance: 500000.0
    description: ライブトレード用初期残高（50万円）
  backtest:
    initial_balance: 500000.0
    description: バックテスト用初期残高（50万円）
exchange:
  name: bitbank
  symbol: BTC/JPY
  leverage: 1.0
  rate_limit_ms: 35000
  timeout_ms: 120000
  retries: 5
  ssl_verify: true
  api_version: v1
data:
  timeframes:
  - 15m
  - 4h
  since_hours: 96
  limit: 100
  cache_enabled: true
  cache:
    enabled: true
    ttl_minutes: 5
    max_size: 1000
    disk_cache: true
    retention_days: 90
cloud_run:
  memory: 1Gi
  cpu: 1
  min_instances: 1
  max_instances: 2
  concurrency: 1
  timeout_seconds: 3600
security:
  secret_management: gcp_secret_manager
  workload_identity: true
trading_constraints:
  exchange: bitbank
  trading_type: margin
  leverage_max: 2.0
  leverage_actual: 1.0
  currency_pair: BTC/JPY
  default_order_type: limit
  initial_capital: 10000
  target_capital: 500000
  features_count: 55
  timeframes:
  - 15m
  - 4h
execution:
  backtest_period_days: 180
  backtest_use_fixed_dates: true
  backtest_start_date: '2025-07-01'
  backtest_end_date: '2025-12-31'
  live_mode_interval_seconds: 300
  paper_mode_interval_seconds: 300
  mode: paper
  order:
    default_type: limit
    slippage_tolerance: 0.001
    max_retry: 3
    retry_delay: 1.0
  latency:
    target_ms: 1000
    warning_ms: 500
    critical_ms: 2000
production:
  min_order_size: 0.0001
  max_order_size: 0.15
  trade_interval: 300
  margin_trading: true
  force_margin_mode: true
position_integrator:
  kelly_weight: 0.0
  dynamic_weight: 1.0
  risk_manager_weight: 0.0
# Phase 67.4: 固定ポジションサイズテーブル（動的計算を廃止）
position_sizing:
  mode: fixed
  fixed_table:
    low: 0.01
    medium: 0.015
    high: 0.02
  confidence_thresholds:
    medium_min: 0.50
    high_min: 0.65
backtest:
  log_level: WARNING
  data_limit: 10000
  progress_interval: 100
  report_interval: 10000
  mock_api_calls: true
  enable_detailed_logging: false
  fast_data_slicing: true
  data_sampling_ratio: 1.0
  inner_loop_count: 1
market_regime:
  tight_range:
    bb_width_threshold: 0.03
    price_range_threshold: 0.02
  trending:
    adx_threshold: 25
    ema_slope_threshold: 0.003
  normal_range:
    bb_width_threshold: 0.05
    adx_threshold: 20
  high_volatility:
    atr_ratio_threshold: 0.018
ml:
  ensemble_enabled: true
  ensemble_weights:
    lightgbm: 0.5
    xgboost: 0.3
    random_forest: 0.2
  models:
  - lgbm
  - xgb
  - rf
  fallback_enabled: true
  prediction:
    lookback_periods: 100
    retrain_frequency: weekly
  confidence_threshold: 0.3
  allow_dummy_fallback: false
  default_confidence: 0.5
  strategy_integration:
    enabled: true
    ml_weight: 0.35
    strategy_weight: 0.7
    high_confidence_threshold: 0.6
    agreement_bonus: 1.2
    disagreement_penalty: 0.95
    min_ml_confidence: 0.32
    hold_conversion_threshold: 0.15
    min_strategy_confidence: 0.22
    ml_signal_recovery:
      enabled: true
      min_ml_confidence: 0.5
      min_individual_confidence: 0.3
      recovery_confidence_cap: 0.35
  regime_ml_integration:
    enabled: true
    tight_range:
      min_ml_confidence: 0.33
      high_confidence_threshold: 0.55
      ml_weight: 0.15
      strategy_weight: 0.85
      agreement_bonus: 1.25
      disagreement_penalty: 0.7
    normal_range:
      min_ml_confidence: 0.3
      high_confidence_threshold: 0.55
      ml_weight: 0.2
      strategy_weight: 0.8
      agreement_bonus: 1.25
      disagreement_penalty: 0.7
    trending:
      min_ml_confidence: 0.35
      high_confidence_threshold: 0.55
      ml_weight: 0.35
      strategy_weight: 0.65
      agreement_bonus: 1.25
      disagreement_penalty: 0.88
    high_volatility:
      min_ml_confidence: 0.8
      high_confidence_threshold: 0.9
      ml_weight: 0.1
      strategy_weight: 0.9
      agreement_bonus: 1.1
      disagreement_penalty: 0.85
  dynamic_confidence:
    base_hold: 0.35
    error_fallback: 0.25
    ml_fallback: 0.35
    neutral_default: 0.4
    strategy_fallback: 0.35
    market_uncertainty:
      volatility_factor_max: 0.1
      volatility_divisor: 1.0
      volume_factor_max: 0.06
      volume_multiplier: 0.2
      price_factor_max: 0.04
      uncertainty_max: 0.2
      uncertainty_boost: 1.0
    strategies:
      donchian_channel:
        breakout_base: 0.6
        breakout_min: 0.3
        breakout_max: 0.85
        reversal_base: 0.5
        reversal_min: 0.3
        reversal_max: 0.7
        hold_base: 0.4
        hold_min: 0.35
        hold_max: 0.6
        volume_bonus_max: 0.1
        volume_multiplier: 0.2
      adx_trend:
        strong_base: 0.65
        strong_min: 0.4
        strong_max: 0.85
        moderate_base: 0.5
        moderate_min: 0.35
        moderate_max: 0.7
        weak_base: 0.35
        weak_min: 0.25
        weak_max: 0.5
        hold_base: 0.45
        hold_min: 0.35
        hold_max: 0.6
        default_min: 0.25
        default_max: 0.6
        adx_bonus_max: 0.25
        adx_divisor: 25
        di_bonus_max: 0.15
        di_divisor: 12
        volume_bonus_max: 0.1
        volume_multiplier: 0.15
      atr_based:
        high_volatility_base: 0.55
        high_volatility_min: 0.35
        high_volatility_max: 0.8
        normal_volatility_base: 0.45
        normal_volatility_min: 0.3
        normal_volatility_max: 0.65
        low_volatility_base: 0.35
        low_volatility_min: 0.25
        low_volatility_max: 0.5
        rsi_base: 0.2
        rsi_multiplier: 0.3
        agreement_max: 0.85
        weak_base: 0.08
        weak_multiplier: 0.1
        volatility_bonus: 1.02
        volatility_max: 0.85
        position_size_base: 0.015
        market_stress_threshold: 0.7
        min_atr_ratio: 0.5
        strength_divisor: 0.2
        strength_normalize: 30.0
  emergency_stop_on_dummy: true
  max_model_failures: 3
  prediction_fallback_confidence: 0.0
  dummy_confidence: 0.5
  model_paths:
    base_path: /app
    local_path: .
    training_path: models/training
performance:
  default_latency_ms: 100.0
dynamic_strategy_selection:
  enabled: true
  # Phase 69: EMAトレンド方向フィルタ（逆張りショート対策）
  trend_filter:
    enabled: true
    ema_slope_threshold: 0.003
    counter_trend_penalty: 0.5
  regime_strategy_mapping:
    tight_range:
      BBReversal: 0.15
      StochasticReversal: 0.10
      ATRBased: 0.45
      DonchianChannel: 0.30
      ADXTrendStrength: 0.0
      MACDEMACrossover: 0.0
    normal_range:
      ATRBased: 0.45
      StochasticReversal: 0.10
      DonchianChannel: 0.20
      BBReversal: 0.0
      ADXTrendStrength: 0.15
      MACDEMACrossover: 0.10
    trending:
      ADXTrendStrength: 0.5
      MACDEMACrossover: 0.3
      ATRBased: 0.15
      DonchianChannel: 0.05
      BBReversal: 0.0
      StochasticReversal: 0.0
    high_volatility:
      ATRBased: 0.0
      BBReversal: 0.0
      DonchianChannel: 0.0
      StochasticReversal: 0.0
      ADXTrendStrength: 0.0
      MACDEMACrossover: 0.0
position_limits:
  tight_range:
    max_positions: 6
  normal_range:
    max_positions: 4
  trending:
    max_positions: 2
  high_volatility:
    max_positions: 0
  fallback_max_positions: 2
  reject_on_limit: true
strategies:
  adx_trend:
    enabled: true
    class_name: ADXTrendStrength
    module_path: src.strategies.implementations.adx_trend
    strategy_type: adx_trend
    weight: 0.1
    priority: 3
    regime_affinity: range
    di_crossover_threshold: 0.5
    di_weak_signal_confidence: 0.35
    hold_confidence: 0.45
    min_confidence: 0.25
    moderate_trend_max: 25
    moderate_trend_min: 15
    strong_trend_threshold: 25
    weak_di_threshold: 0.8
    weak_trend_threshold: 15
    range_mode_enabled: true
    range_adx_threshold: 20
    use_rsi_driven_mode: false
    rsi_oversold_trigger: 40
    rsi_overbought_trigger: 60
    bb_lower_trigger: 0.3
    bb_upper_trigger: 0.7
    range_signal_confidence: 0.4
    rsi_extreme_bonus: 0.1
    bb_extreme_bonus: 0.05
    adx_falling_bonus: 0.05
    di_reversal_threshold: 5.0
    di_diff_threshold: 8.0
    di_divergence_threshold: 12.0
    use_di_divergence: false
  atr_based:
    enabled: true
    class_name: ATRBased
    module_path: src.strategies.implementations.atr_based
    strategy_type: atr_based
    weight: 0.15
    priority: 1
    regime_affinity: range
    exhaustion_threshold: 0.7
    high_exhaustion_threshold: 0.85
    adx_range_threshold: 25
    rsi_upper: 60
    rsi_lower: 40
    rsi_confirmation_bonus: 0.05
    min_confidence: 0.35
    hold_confidence: 0.2
    base_confidence: 0.4
    high_confidence: 0.6
    min_score_threshold: 0.65
    bb_position_enabled: true
    bb_position_threshold: 0.2
    bb_as_main_condition: false
    sl_atr_multiplier: 1.5
  donchian_channel:
    enabled: true
    class_name: DonchianChannel
    module_path: src.strategies.implementations.donchian_channel
    strategy_type: donchian_channel
    weight: 0.2
    priority: 2
    regime_affinity: range
    adx_max_threshold: 28
    extreme_zone_threshold: 0.18
    rsi_oversold: 48
    rsi_overbought: 52
    base_confidence: 0.4
    max_confidence: 0.6
    min_confidence: 0.3
    hold_confidence: 0.25
    extreme_position_bonus: 0.1
    rsi_confirmation_bonus: 0.05
    rsi_as_bonus: true
    rsi_mismatch_penalty: 0.08
  bb_reversal:
    enabled: true
    class_name: BBReversal
    module_path: src.strategies.implementations.bb_reversal
    strategy_type: bb_reversal
    weight: 0.3
    priority: 4
    regime_affinity: range
    min_confidence: 0.25
    hold_confidence: 0.2
    bb_width_threshold: 0.035
    rsi_overbought: 55
    rsi_oversold: 45
    bb_upper_threshold: 0.7
    bb_lower_threshold: 0.3
    adx_range_threshold: 30
    sl_multiplier: 1.5
    bb_primary_mode: true
    rsi_match_bonus: 0.08
    rsi_extreme_bonus: 0.05
    rsi_mismatch_penalty: 0.05
  stochastic_reversal:
    enabled: true
    class_name: StochasticReversal
    module_path: src.strategies.implementations.stochastic_reversal
    strategy_type: stochastic_reversal
    weight: 0.2
    priority: 5
    regime_affinity: range
    divergence_lookback: 5
    divergence_price_threshold: 0.001
    divergence_stoch_threshold: 4
    min_price_change_ratio: 0.005
    enable_min_price_filter: true
    stoch_overbought: 60
    stoch_oversold: 40
    adx_max_threshold: 50
    min_confidence: 0.25
    hold_confidence: 0.2
    base_confidence: 0.32
    max_confidence: 0.6
    zone_bonus: 0.12
    sl_multiplier: 1.5
  macd_ema_crossover:
    enabled: true
    class_name: MACDEMACrossover
    module_path: src.strategies.implementations.macd_ema_crossover
    strategy_type: macd_ema_crossover
    weight: 0.05
    priority: 6
    regime_affinity: trend
    min_confidence: 0.3
    hold_confidence: 0.25
    adx_trend_threshold: 18
    volume_ratio_threshold: 1.0
    macd_strong_threshold: 50000
    ema_divergence_threshold: 0.01
    sl_multiplier: 1.5
tp_sl_auto_detection:
  enabled: true
  log_level: info
tp_sl_verification:
  enabled: true
  delay_seconds: 600
  rebuild_on_missing: true
  default_regime: tight_range
trading:
