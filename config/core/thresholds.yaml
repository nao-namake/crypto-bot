      # Phase 85: floor 0.7%復活（Phase 83B撤廃判断は sl_simulation.py の手数料加算バグに基づく虚像と判明）
      # 真の運用シミュ106件で floor 0.7% 無しは全シナリオ -200円/件超の壊滅的損失
