      timeout_seconds: 10
      fallback_to_native: true
    fixed_amount:
      enabled: true
      target_net_profit: 500
      confidence_based:
        enabled: true
        threshold: 0.40
        low: 400
        high: 500
      include_entry_fee: true
      include_exit_fee_rebate: true
      include_interest: true
      fallback_entry_fee_rate: 0.001
      fallback_exit_fee_rate: 0.0
    regime_based:
      enabled: true
      tight_range:
        min_profit_ratio: 0.004
