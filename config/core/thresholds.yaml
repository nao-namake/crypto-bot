    strategy_type: cmf_reversal
    weight: 0.2
    priority: 2
    regime_affinity: range
    cmf_buy_threshold: -0.10
    cmf_sell_threshold: 0.10
    cmf_extreme_threshold: 0.15
    adx_max_threshold: 28
    rsi_oversold: 48
    rsi_overbought: 52
    base_confidence: 0.4
    max_confidence: 0.6
    min_confidence: 0.3
    hold_confidence: 0.10
    extreme_position_bonus: 0.1
    rsi_confirmation_bonus: 0.05
    rsi_mismatch_penalty: 0.08
  bb_reversal:
    enabled: true
    class_name: BBReversal
    module_path: src.strategies.implementations.bb_reversal
    strategy_type: bb_reversal
    weight: 0.3
    priority: 4
    regime_affinity: range
    min_confidence: 0.25
    hold_confidence: 0.10
    bb_width_threshold: 0.06
    rsi_overbought: 55
    rsi_oversold: 45
    bb_upper_threshold: 0.75
    bb_lower_threshold: 0.25
    adx_range_threshold: 30
    sl_multiplier: 1.5
    bb_primary_mode: true
    rsi_match_bonus: 0.08
    rsi_extreme_bonus: 0.05
    rsi_mismatch_penalty: 0.05
  stochastic_reversal:
    enabled: true
    class_name: StochasticReversal
    module_path: src.strategies.implementations.stochastic_reversal
    strategy_type: stochastic_reversal
    weight: 0.2
    priority: 5
    regime_affinity: range
    divergence_lookback: 8
    divergence_price_threshold: 0.001
    divergence_stoch_threshold: 4
    min_price_change_ratio: 0.003
    enable_min_price_filter: true
    stoch_overbought: 65
    stoch_oversold: 35
    adx_max_threshold: 50
    min_confidence: 0.25
    hold_confidence: 0.10
    base_confidence: 0.32
    max_confidence: 0.6
    zone_bonus: 0.12
    sl_multiplier: 1.5
  macd_ema_crossover:
    enabled: true
    class_name: MACDEMACrossover
    module_path: src.strategies.implementations.macd_ema_crossover
    strategy_type: macd_ema_crossover
    weight: 0.05
    priority: 6
