# ========================================
# 動的閾値設定ファイル (thresholds.yaml)
# ========================================
# 目的: ML統合・リスク管理・戦略パラメータの動的閾値一元管理
#
# このファイルの役割:
#   1. ML統合パラメータ（信頼度閾値・重み・ボーナス/ペナルティ）
#   2. 動的信頼度計算（市場不確実性調整・戦略別信頼度範囲）
#   3. 戦略パラメータ（5戦略の閾値・信頼度計算）
#   4. リスク管理設定（Kelly基準・ドローダウン・証拠金維持率）
#   5. ポジション管理設定（TP/SL・緊急決済）
#   6. Optuna最適化パラメータ（Phase 40最適化結果）
#
# 設定ファイル分離:
#   - features.yaml: 機能オンオフ
#   - unified.yaml: 基本設定（exchange、mode等）
#   - thresholds.yaml: 動的閾値（このファイル）
#   - feature_order.json: 特徴量定義
#
# 使用方法:
#   - get_threshold()関数で動的に参照（ハードコード禁止）
#   - Optuna最適化: scripts/optimization/run_phase40_optimization.py
#
# ========================================

# ========================================
# 実行設定（Execution Settings）
# ========================================
execution:
  backtest_period_days: 180  # Phase 57.11: スクリプト指定
  # Phase 57.13: 固定期間バックテスト設定
  backtest_use_fixed_dates: true       # true: 固定期間, false: ローリングウィンドウ
  backtest_start_date: "2025-07-01"    # 固定期間開始日（ISO形式）
  backtest_end_date: "2025-12-31"      # 固定期間終了日（ISO形式）
  live_mode_interval_seconds: 300
  paper_mode_interval_seconds: 300

# ========================================
# 本番運用設定（Production Settings）
# ========================================
# Phase 55.2: ポジションサイズ設定の一元管理
# - Kelly基準・ExecutionService等がget_threshold()で参照
# - unified.yamlから移動（設定重複解消）
# ========================================
production:
  min_order_size: 0.0001  # Bitbank最小取引単位（約1,650円@BTC=16,500,000円）
  max_order_size: 0.15    # Phase 60.1: 0.05→0.15（実効レバレッジ0.5倍移行）

# ========================================
# Phase 55.5: ポジションサイズ統合設定
# ========================================
# 目的: min()からの加重平均方式へ移行
# 問題: min()だとDynamic（BTC高価格で極小化）が常にボトルネック化
# 解決: Kelly 50% / Dynamic 30% / RiskManager 20%の加重平均
# 効果: 0.0001 BTC → 約0.009 BTC（Kelly基準が活かされる）
# ========================================
position_integrator:
  kelly_weight: 0.5          # Phase 57.9: 70%→50%（12/30設定に復元）
  dynamic_weight: 0.3        # Phase 57.9: 20%→30%（12/30設定に復元）
  risk_manager_weight: 0.2   # Phase 57.9: 10%→20%（12/30設定に復元）

# ========================================
# バックテスト設定（Backtest Settings）
# ========================================
backtest:
  log_level: WARNING
  data_limit: 10000  # Phase 51.10-C: サンプル数上限（10,000件で停止）
  progress_interval: 100  # Phase 51.10-C: 進捗表示間隔（100件毎・1000→100に改善）
  report_interval: 10000
  mock_api_calls: true
  enable_detailed_logging: false
  fast_data_slicing: true
  data_sampling_ratio: 1.0  # Phase 51.8-10: 全データ使用（backtest_period_daysで期間制限）
  inner_loop_count: 1  # Phase 51.8-J4-H: 高速化（1回実行・約40分）注: Phase 51.8-K完了後、最終検証時は3に戻す

# ========================================
# 🌐 市場レジーム判定設定（Market Regime Classification）
# ========================================
# Phase 61: レジーム判定閾値を設定ファイルで管理
#
# 目的: ハードコードからの脱却・閾値調整の容易化
#
# 変更履歴:
#   - Phase 61.1: 閾値調整を試行→PF大幅低下（1.58→1.13）
#   - Phase 61.1ロールバック: Phase 60オリジナル値に復元
#
# 注: 閾値はget_threshold()のデフォルト値と一致させること
# ========================================
market_regime:
  tight_range:
    bb_width_threshold: 0.03          # Phase 60オリジナル値（Phase 61.1ロールバック）
    price_range_threshold: 0.02       # Phase 60オリジナル値（Phase 61.1ロールバック）
  trending:
    adx_threshold: 25                 # Phase 60オリジナル値（Phase 61.1ロールバック）
    ema_slope_threshold: 0.01         # Phase 60オリジナル値（Phase 61.1ロールバック）
  normal_range:
    bb_width_threshold: 0.05          # 維持
    adx_threshold: 20                 # 維持
  high_volatility:
    atr_ratio_threshold: 0.018        # 維持（4時間足最適化済み）

# ========================================
# 🤖 ML統合設定（ML Integration Settings）
# ========================================
# Phase 41.8.5最適化完了:
#   - min_ml_confidence: 0.45（3クラス分類対応）
#   - high_confidence_threshold: 0.60（3クラス分類対応）
#   - ML統合率100%達成（10%→100%改善）
#   - 3段階統合ロジック（<0.45: 戦略のみ・0.45-0.60: 加重平均・≥0.60: ボーナス/ペナルティ）
# ========================================
ml:
  confidence_threshold: 0.3
  allow_dummy_fallback: false
  default_confidence: 0.5
  strategy_integration:
    enabled: true
    ml_weight: 0.35
    strategy_weight: 0.7
    high_confidence_threshold: 0.6
    agreement_bonus: 1.2
    disagreement_penalty: 0.95  # Phase 55.3: 0.90→0.95（ペナルティ緩和）
    min_ml_confidence: 0.32      # Phase 55.3: 0.35→0.32（閾値緩和）
    hold_conversion_threshold: 0.15  # Phase 55.5: 0.20→0.15（HOLD変換さらに緩和）
    min_strategy_confidence: 0.22   # Phase 65: 0.25→0.22（0.246-0.248のシグナルが僅差で遮断されていた問題を解消）
  # ========================================
  # Phase 51.9: レジーム別ML統合設定
  # ========================================
  # Phase 51.8バックテスト結果に基づく最適化:
  #   - tight_range: 利益の99.4%寄与 → 戦略重視・ML補完控えめ
  #   - normal_range: 利益の0.6%寄与・PF=1.005 → バランス型
  #   - trending: 未発生だが将来対応 → ML補完重視
  #   - high_volatility: エントリー禁止 → 超高閾値
  # ========================================
  regime_ml_integration:
    enabled: true  # Phase 51.9: レジーム別ML統合有効化

    # tight_range（狭いレンジ）: 戦略重視型
    # Phase 60.4: ML重み削減・戦略重視設定（一致率51.9%→60%+目標）
    tight_range:
      min_ml_confidence: 0.33           # Phase 60.4: 0.25→0.33（ロールバック・3クラス最低閾値）
      high_confidence_threshold: 0.55   # Phase 61.5: 0.70→0.55（9%→46%が対象・ボーナス/ペナルティ発動率向上）
      ml_weight: 0.15                   # Phase 60.4: 0.25→0.15（ML重み削減）
      strategy_weight: 0.85             # Phase 60.4: 0.75→0.85（戦略重視）
      agreement_bonus: 1.25             # Phase 60.4: 1.10→1.25（一致時勝率66.1%活用）
      disagreement_penalty: 0.70        # Phase 60.4: 0.80→0.70（不一致時勝率42.5%抑制）

    # normal_range（通常レンジ）: バランス型
    # Phase 60.4: ML重み削減・戦略重視設定（一致率51.9%→60%+目標）
    normal_range:
      min_ml_confidence: 0.30           # Phase 60.4: 0.22→0.30（ロールバック・3クラス最低閾値）
      high_confidence_threshold: 0.55   # Phase 61.5: 0.65→0.55（ボーナス/ペナルティ発動率向上）
      ml_weight: 0.20                   # Phase 60.4: 0.30→0.20（ML重み削減）
      strategy_weight: 0.80             # Phase 60.4: 0.70→0.80（戦略重視）
      agreement_bonus: 1.25             # Phase 60.4: 1.10→1.25（一致時勝率66.1%活用）
      disagreement_penalty: 0.70        # Phase 60.4: 0.80→0.70（不一致時勝率42.5%抑制）

    # trending（トレンド）: ML補完重視型
    # Phase 51.8結果: 0件（未発生）
    # → 実験的設定・ML補完を積極活用
    trending:
      min_ml_confidence: 0.35           # 低閾値（ML補完重視）
      high_confidence_threshold: 0.55
      ml_weight: 0.35                   # ML 35%
      strategy_weight: 0.65             # 戦略 65%
      agreement_bonus: 1.25             # ML・戦略一致時ボーナス強化
      disagreement_penalty: 0.88        # ML・戦略不一致時ペナルティやや強化

    # high_volatility（高ボラティリティ）: 超保守型
    # Phase 51.8結果: 0件（未発生・ポジション制限0でエントリー禁止）
    # → 超高閾値でほぼエントリーなし
    high_volatility:
      min_ml_confidence: 0.80           # 超高閾値（実質エントリーなし）
      high_confidence_threshold: 0.90
      ml_weight: 0.10                   # ML 10%
      strategy_weight: 0.90             # 戦略 90%
      agreement_bonus: 1.10             # ボーナス最小
      disagreement_penalty: 0.85        # ペナルティ最強化

  dynamic_confidence:
    base_hold: 0.35
    error_fallback: 0.25
    ml_fallback: 0.35
    neutral_default: 0.4
    strategy_fallback: 0.35
    market_uncertainty:
      volatility_factor_max: 0.1
      volatility_divisor: 1.0
      volume_factor_max: 0.06
      volume_multiplier: 0.2
      price_factor_max: 0.04
      uncertainty_max: 0.2
      uncertainty_boost: 1.0
    strategies:
      # DonchianChannel戦略動的信頼度設定
      donchian_channel:
        breakout_base: 0.6
        breakout_min: 0.3
        breakout_max: 0.85
        reversal_base: 0.5
        reversal_min: 0.3
        reversal_max: 0.7
        hold_base: 0.4
        hold_min: 0.35
        hold_max: 0.6
        volume_bonus_max: 0.1
        volume_multiplier: 0.2

      # ADXTrend戦略動的信頼度設定（Phase 51.9-5: インデント修正）
      adx_trend:
        strong_base: 0.65
        strong_min: 0.4
        strong_max: 0.85
        moderate_base: 0.5
        moderate_min: 0.35
        moderate_max: 0.7
        weak_base: 0.35
        weak_min: 0.25
        weak_max: 0.5
        hold_base: 0.45
        hold_min: 0.35
        hold_max: 0.6
        default_min: 0.25
        default_max: 0.6
        adx_bonus_max: 0.25
        adx_divisor: 25
        di_bonus_max: 0.15
        di_divisor: 12
        volume_bonus_max: 0.1
        volume_multiplier: 0.15

      # ATRBased戦略動的信頼度設定（Phase 51.9-5: strategies配下に移動）
      atr_based:
        high_volatility_base: 0.55
        high_volatility_min: 0.35
        high_volatility_max: 0.8
        normal_volatility_base: 0.45
        normal_volatility_min: 0.3
        normal_volatility_max: 0.65
        low_volatility_base: 0.35
        low_volatility_min: 0.25
        low_volatility_max: 0.5
        rsi_base: 0.2
        rsi_multiplier: 0.3
        agreement_max: 0.85
        weak_base: 0.08
        weak_multiplier: 0.1
        volatility_bonus: 1.02
        volatility_max: 0.85
        position_size_base: 0.015       # ← ML訓練で参照（Phase 51.9-5: 階層修正で解決）
        market_stress_threshold: 0.7
        min_atr_ratio: 0.5
        strength_divisor: 0.2
        strength_normalize: 30.0
  emergency_stop_on_dummy: true
  max_model_failures: 3
  prediction_fallback_confidence: 0.0
  dummy_confidence: 0.5
  model_paths:
    base_path: /app
    local_path: .
    training_path: models/training

# ========================================
# 📊 動的信頼度計算（Dynamic Confidence Calculation）
# ========================================
# 市場不確実性に基づく信頼度調整・戦略別信頼度範囲設定
# ========================================
performance:
  default_latency_ms: 100.0

# ========================================
# 🎯 動的戦略選択設定（Dynamic Strategy Selection）
# ========================================
# Phase 51.5-A: 3戦略構成最適化（MochipoyAlert・MultiTimeframe削除）
#
# 目的: 市場レジーム（tight_range/normal_range/trending/high_volatility）に応じて
#       戦略の重みを動的に変更し、レジーム特性に最適化された戦略選択を実現
#
# 設定方法:
#   - レジーム名: tight_range, normal_range, trending, high_volatility
#   - 戦略名: ATRBased, BBReversal, DonchianChannel, StochasticReversal,
#             ADXTrendStrength, MACDEMACrossover（6戦略）
#   - 重み: 0.0-1.0（合計1.0になるように設定）
#   - high_volatility: 全戦略無効化（全て0.0）
# ========================================
dynamic_strategy_selection:
  enabled: true  # Phase 51.8-J2: レジーム別戦略重み最適化有効化（バックテスト評価）
  # レジーム別戦略重みマッピング
  # Phase 51.8: 6戦略統合・レジーム別重み初期値（バックテスト最適化前）
  regime_strategy_mapping:
    tight_range:  # 狭いレンジ相場（BB幅 < 3%, 価格変動 < 2%）
      # Phase 65: BBReversal再有効化（62.2でBB主導ロジック変更済み・HOLD支配解消）
      BBReversal: 0.15          # Phase 65: 0.0→0.15（再有効化・BB主導ロジック変更後の再評価）
      StochasticReversal: 0.30  # Phase 65: 0.35→0.30（再配分）
      ATRBased: 0.30            # Phase 65: 0.35→0.30（再配分）
      DonchianChannel: 0.25     # Phase 65: 0.30→0.25（再配分）
      ADXTrendStrength: 0.0     # トレンド型→無効化
      MACDEMACrossover: 0.0     # トレンド型→無効化
    normal_range:  # 通常レンジ相場（BB幅 < 5%, ADX < 20）
      # Phase 59.1: BBReversal無効化（0%勝率問題）
      ATRBased: 0.50            # 主力
      StochasticReversal: 0.30  # 補助
      DonchianChannel: 0.20     # 補助
      BBReversal: 0.0           # 無効化（0%勝率問題）
      ADXTrendStrength: 0.0     # トレンド型→無効化
      MACDEMACrossover: 0.0     # トレンド型→無効化
    trending:  # トレンド相場（ADX > 25, EMA傾き > 1%）
      # Phase 51.8-10: トレンド型80/20配分（理論的初期値）
      ADXTrendStrength: 0.50    # ↑ 0.40→0.50（トレンド主力強化）
      MACDEMACrossover: 0.30    # = 0.30（維持）
      ATRBased: 0.15            # ↓ 0.20→0.15（削減）
      DonchianChannel: 0.05     # ↓ 0.10→0.05（削減）
      BBReversal: 0.0           # = 0.0（無効化）
      StochasticReversal: 0.0   # = 0.0（無効化）
    high_volatility:  # 高ボラティリティ（ATR比 > 1.8%・4時間足）
      # 全戦略無効化（完全待機モード）
      ATRBased: 0.0
      BBReversal: 0.0
      DonchianChannel: 0.0
      StochasticReversal: 0.0
      ADXTrendStrength: 0.0
      MACDEMACrossover: 0.0

# ========================================
# 📊 レジーム別ポジション制限設定（Regime-Based Position Limits）
# ========================================
# Phase 51.8: レジーム別保有ポジション制限実装
#
# 目的: 市場レジームに応じて保有ポジション数を動的に制限し、
#       リスク管理を強化・市場状況に最適化されたポジション管理を実現
#
# 設定方法:
#   - レジーム名: tight_range, normal_range, trending, high_volatility
#   - max_positions: 最大同時保有ポジション数（0-5件）
#   - 制限超過時: 新規エントリー拒否（reject_on_limit: true）
#
# 設計根拠:
#   - tight_range: レンジ相場は逆張りチャンス多数 → 分散投資重視（5件）
#   - normal_range: バランス型 → 適度な分散（4件）
#   - trending: トレンド相場は集中投資 → 中程度の集中（3件）
#   - high_volatility: 完全待機 → 損失回避（0件）
# ========================================
position_limits:
  tight_range:
    max_positions: 6      # Phase 51.8-10: 5→6（分散投資最大化）
  normal_range:
    max_positions: 4      # バランス型（維持）
  trending:
    max_positions: 2      # Phase 51.8-10: 3→2（集中投資・損失最小化）
  high_volatility:
    max_positions: 0      # 完全待機（維持）
  # エラーフォールバック設定
  fallback_max_positions: 2    # レジーム情報取得失敗時のデフォルト値
  reject_on_limit: true         # 制限超過時は新規エントリー拒否

# ========================================
# 🎯 戦略パラメータ（Strategy Parameters）
# ========================================
# 5戦略の閾値・信頼度計算設定
# ========================================
strategies:
  adx_trend:
    # Phase 54.10: HOLD率削減のため閾値緩和
    di_crossover_threshold: 0.5
    di_weak_signal_confidence: 0.35
    hold_confidence: 0.45
    min_confidence: 0.25
    moderate_trend_max: 25
    moderate_trend_min: 15
    strong_trend_threshold: 25
    weak_di_threshold: 0.8          # Phase 54.10: 1.0→0.8（シグナル増加）
    weak_trend_threshold: 15

    # ========================================
    # Phase 56.9: RSI主導型レンジ逆張りモード
    # ========================================
    # Web調査: レンジ相場ではDIよりRSI+BBが有効
    # 変更: DI条件からRSI+BB主導に変更しシグナル増加
    # ========================================
    range_mode_enabled: true          # レンジ逆張りモード有効化
    range_adx_threshold: 20           # ADX < 20 でレンジモード（元に戻す）

    # Phase 56.9: RSI主導トリガー（無効化・DIロジックに戻す）
    use_rsi_driven_mode: false        # RSI主導モード無効化
    rsi_oversold_trigger: 40          # RSI < 40 で買いシグナル
    rsi_overbought_trigger: 60        # RSI > 60 で売りシグナル
    bb_lower_trigger: 0.30            # BB位置 < 0.30 で買い（データ分析に基づく）
    bb_upper_trigger: 0.70            # BB位置 > 0.70 で売り（データ分析に基づく）

    # 信頼度設定
    range_signal_confidence: 0.40     # 基本信頼度
    rsi_extreme_bonus: 0.10           # RSI < 25 or > 75 ボーナス
    bb_extreme_bonus: 0.05            # BB < 0.15 or > 0.85 ボーナス
    adx_falling_bonus: 0.05           # ADX下降中ボーナス

    # 従来DI設定（フォールバック用）
    di_reversal_threshold: 5.0        # DI変化量閾値
    di_diff_threshold: 8.0            # DI差分閾値
    di_divergence_threshold: 12.0     # DI乖離閾値
    use_di_divergence: false          # DI乖離モード無効

  atr_based:
    # ========================================
    # Phase 57: Phase 55.4設定に復元（PF > 1実績）
    # ========================================
    # Phase 56.10でBB条件化実験→PF低下→元に戻す
    # Phase 55.4の高閾値設定でPF 1.16を達成
    # ========================================
    # ATR消尽率パラメータ（Phase 55.4: 高閾値）
    exhaustion_threshold: 0.70       # Phase 55.4: 0.55→0.70（高品質シグナルのみ）
    high_exhaustion_threshold: 0.85  # Phase 55.4: 0.70→0.85（高確信シグナル）
    # レンジ相場フィルタ
    adx_range_threshold: 25          # Phase 55.4: 28→25（レンジ判定緩和）
    # 反転方向判定（RSIメイン条件）
    rsi_upper: 60                    # Phase 55.4: 55→60（明確な過熱のみ）
    rsi_lower: 40                    # Phase 55.4: 45→40（明確な売られすぎのみ）
    rsi_confirmation_bonus: 0.05
    # 信頼度設定
    min_confidence: 0.35
    hold_confidence: 0.20
    base_confidence: 0.40
    high_confidence: 0.60
    # スコア閾値
    min_score_threshold: 0.65        # Phase 55.4: 0.55→0.65（高品質シグナルのみ）
    # BB位置確認（ボーナスとして使用）
    bb_position_enabled: true
    bb_position_threshold: 0.20
    bb_as_main_condition: false      # メイン条件ではなくボーナスとして使用
    # ストップロス設定
    sl_atr_multiplier: 1.5
  donchian_channel:
    # ========================================
    # Phase 62.2: RSIボーナス制度（21件・71.4%勝率 → 取引数増加）
    # ========================================
    # 設計思想: タイトレンジ向け直列評価方式
    # - RSIフィルタをHOLD→ボーナス制度に変更
    # - BB位置主導でシグナル発生
    # ========================================

    # === 直列評価パラメータ（Phase 62.1-B: さらに緩和） ===
    adx_max_threshold: 28           # 維持
    extreme_zone_threshold: 0.18    # Phase 62.1-B: 0.15→0.18（さらに緩和）
    rsi_oversold: 48                # Phase 62.1-B: 45→48（さらに緩和）
    rsi_overbought: 52              # Phase 62.1-B: 55→52（さらに緩和）

    # === 信頼度設定（シンプル化） ===
    base_confidence: 0.40
    max_confidence: 0.60
    min_confidence: 0.30
    hold_confidence: 0.25

    # === 信頼度ボーナス ===
    extreme_position_bonus: 0.10    # 位置が極端（< 0.05 or > 0.95）
    rsi_confirmation_bonus: 0.05   # RSI極端値（< 30 or > 70）

    # === Phase 62.2: RSIボーナス制度 ===
    rsi_as_bonus: true              # RSIをHOLD→ボーナス制度に
    rsi_mismatch_penalty: 0.08      # RSI不一致時の信頼度ペナルティ
  bb_reversal:
    # ========================================
    # Phase 62.2: BB位置主導・RSIボーナス制度（3件→8-12件期待）
    # ========================================
    # 設計思想: AND条件→BB主導に変更
    # - BB位置だけでシグナル発生
    # - RSIは確認（ボーナス）として使用
    # ========================================
    min_confidence: 0.25            # 維持
    hold_confidence: 0.20           # 維持
    bb_width_threshold: 0.035       # 維持
    rsi_overbought: 55              # Phase 62.1-B: 58→55（さらに緩和）
    rsi_oversold: 45                # Phase 62.1-B: 42→45（さらに緩和）
    bb_upper_threshold: 0.70        # Phase 62.1-B: 0.75→0.70（さらに緩和）
    bb_lower_threshold: 0.30        # Phase 62.1-B: 0.25→0.30（さらに緩和）
    adx_range_threshold: 30         # 維持
    sl_multiplier: 1.5              # SL ATR倍率（レンジ相場用）

    # === Phase 62.2: BB位置主導・RSIボーナス制度 ===
    bb_primary_mode: true           # BB位置主導モード（RSIはボーナス）
    rsi_match_bonus: 0.08           # RSI一致時ボーナス
    rsi_extreme_bonus: 0.05         # RSI極端値（<30, >70）追加ボーナス
    rsi_mismatch_penalty: 0.05      # RSI不一致時ペナルティ（HOLDではなく削減）
  stochastic_reversal:
    # ========================================
    # Phase 62.2: 最小価格変化フィルタ追加（44件・54.5%勝率 → 品質向上）
    # ========================================
    # 核心思想: 「価格が上昇しているのにStochasticは低下 = モメンタム弱化 = 反転間近」
    # Phase 62.2: 弱いダイバージェンス（0.3%未満）をフィルタリング
    # ========================================

    # === Divergence設定（Phase 55.3: 緩和） ===
    divergence_lookback: 5              # ダイバージェンス検出期間
    divergence_price_threshold: 0.0010  # 維持
    divergence_stoch_threshold: 4       # 維持

    # === Phase 62.2: 最小価格変化フィルタ ===
    min_price_change_ratio: 0.005       # 最小価格変化（0.5%以上）
    enable_min_price_filter: true       # フィルタ有効化

    # === 極端領域設定（Phase 62.1-B: さらに緩和） ===
    stoch_overbought: 60                # Phase 62.1-B: 65→60（さらに緩和）
    stoch_oversold: 40                  # Phase 62.1-B: 35→40（さらに緩和）

    # === ADX設定（維持） ===
    adx_max_threshold: 50               # 維持（強トレンド除外のみ）

    # === 信頼度設定（Phase 55.3: 緩和） ===
    min_confidence: 0.25                # 0.30→0.25（緩和）
    hold_confidence: 0.20               # 0.22→0.20（緩和）
    base_confidence: 0.32               # 0.35→0.32（緩和）
    max_confidence: 0.60                # 維持
    zone_bonus: 0.12                    # 0.10→0.12（ボーナス増加）

    # === SL設定 ===
    sl_multiplier: 1.5                  # SL ATR倍率
  macd_ema_crossover:
    # Phase 56.9: 取引数増加のため閾値さらに緩和
    min_confidence: 0.30            # Phase 54.10: 0.35→0.30（取引数増加）
    hold_confidence: 0.25
    adx_trend_threshold: 18         # Phase 56.9: 22→18（トレンド検出感度UP）
    volume_ratio_threshold: 1.0     # Phase 54.10: 1.1→1.0（出来高要件緩和）
    macd_strong_threshold: 50000    # MACD強い閾値（ヒストグラム正規化用）
    ema_divergence_threshold: 0.01  # EMA乖離度閾値（1%）
    sl_multiplier: 1.5              # SL ATR倍率（トレンド相場用）

# ========================================
# Phase 61.9: TP/SL自動執行検知設定
# ========================================
# 目的: bitbankがTP/SL注文を自動執行した際の検知・記録
# 背景: botは5-7分間隔で実行されるため、TP/SL約定タイミングを逃す
# 効果: SL約定がログに記録される → 分析・改善が可能に
# ========================================
tp_sl_auto_detection:
  enabled: true                    # 自動執行検知機能ON/OFF
  log_level: "info"                # ログレベル（"info" / "warning"）

# ========================================
# Phase 62.20: TP/SL欠損自動復旧設定
# ========================================
# 目的: Atomic Entry完了後にTP/SL欠損を自動検知・再構築
# 背景: APIエラー50062等でBot内部状態とbitbank実態が乖離する可能性
# 効果: SL欠損による無防備なポジション保有を防止
# ========================================
tp_sl_verification:
  enabled: true                    # TP/SL検証機能ON/OFF
  delay_seconds: 600               # Phase 62.21: 検証までの待機時間（秒）- 10分（stop_limitタイムアウト後）
  rebuild_on_missing: true         # 欠損時に自動再構築
  default_regime: "tight_range"    # 再構築時のデフォルトレジーム（保守的）

# ========================================
# 💹 取引設定（Trading Settings）
# ========================================
# 取引実行・信頼度レベル・Kelly基準設定
# ========================================
trading:
  # ========================================
  # Phase 62.19: 手数料設定（2026年2月2日改定対応）
  # ========================================
  # 目的: TP/SL自動執行時の正確な実現損益計算
  #
  # bitbank公式手数料（2026年2月2日改定）:
  #   https://bitbank.cc/blog/articles/726061459
  #   - Maker: 0%（リベート終了）
  #   - Taker: 0.1%（0.12%から引下げ）
  #
  # MakerとTakerの判定基準:
  #   - Maker: 注文が板に残り、他者が約定させた場合
  #   - Taker: 既存の板から即時約定した場合
  #
  # 本システムの注文パターン（Phase 62.9-62.10 Maker戦略）:
  #   - エントリー: limit + post_only → Maker 0%
  #   - TP決済: limit + post_only → Maker 0%
  #   - SL決済: stop_limit（post_only非対応）→ Taker 0.1%
  # ========================================
  fees:
    # Phase 62.19: Maker手数料（2026年2月2日改定）
    maker_rate: 0.0             # Phase 62.19: Maker 0%（リベート終了）
    # Phase 62.19: Taker手数料（2026年2月2日改定）
    taker_rate: 0.001           # Phase 62.19: Taker 0.1%
    # 実際の計算に使用する設定（Maker戦略でMaker約定が基本）
    entry_taker_rate: 0.001     # Phase 62.19: エントリー Taker 0.1%（フォールバック時）
    exit_taker_rate: 0.001      # Phase 62.19: 決済 Taker 0.1%（SL自動執行）
    # Phase 62.19: バックテスト用手数料（Maker対応・ライブと統一）
    # エントリー: Maker 0%
    # TP決済: Maker 0%
    # SL決済: Taker 0.1%（bitbank APIでSLはpost_only非対応）
    backtest_entry_rate: 0.0    # Phase 62.19: Maker 0%
    backtest_tp_exit_rate: 0.0  # Phase 62.19: TP決済 Maker 0%
    backtest_sl_exit_rate: 0.001  # Phase 62.19: SL決済 Taker 0.1%
    backtest_exit_rate: 0.001   # Phase 62.19: 後方互換 Taker 0.1%
  # Phase 56.6: 資金アロケーション上限（ポジションサイズ計算に使用する残高上限）
  # null/0で無制限（実残高をそのまま使用）、正の値で上限設定
  capital_allocation_limit: 500000.0  # Phase 57.6: 50万円全額使用（年利10%目標）
  anomaly:
    spread_critical_threshold: 0.005
    spread_warning_threshold: 0.003
  ask_spread_ratio: 1.001
  bid_spread_ratio: 0.999
  confidence_levels:
    high: 0.45
    low: 0.2
    medium: 0.3
    min_ml: 0.12
    very_high: 0.6
  fallback_btc_jpy: 16500000.0
  fallback_prices:
    ask: 16600000.0
    bid: 16400000.0
    default_ask: 16100000.0
    default_bid: 15900000.0
  kelly_criterion:
    min_trades_for_kelly: 5
    max_position_ratio: 1.00    # Phase 60.1: 0.35→1.00（実効レバレッジ0.5倍移行）
    safety_factor: 0.9          # Phase 57.9: 1.0 → 0.9（12/30設定に復元）
  min_trade_size: 0.0001
  initial_position_size: 0.015    # Phase 60.1: 0.005→0.015（実効レバレッジ0.5倍移行）
  fee_rate: 0.001   # Phase 62.19: Taker 0.1%
  minimum_live_balance: 3000
  position_sizing:
    max_position_ratio: 1.00    # Phase 60.1: 0.35→1.00（実効レバレッジ0.5倍移行）
    stop_loss_atr_multiplier: 1.2
    stop_loss_rate: 0.02
    take_profit_rate: 0.04
    take_profit_ratio: 2.0
  risk_thresholds:
    conditional: 0.65
    deny: 0.85
    min_ml_confidence: 0.12
  stats_log_interval: 10

# ========================================
# 🧠 アンサンブルモデル設定（Ensemble Model Settings）
# ========================================
ensemble:
  max_nan_ratio_features: 0.5
  max_nan_ratio_target: 0.3
  min_training_samples: 50

  # ========================================
  # Phase 59.7: Stacking Meta-Learner設定
  # ========================================
  # 目的: ベースモデルの予測確率をMeta-Learnerで統合
  # 期待効果: F1スコア 0.41 → 0.50+（+20%以上）
  # フォールバック: stacking_enabled=falseで従来の重み付け平均に戻せる
  # ========================================
  stacking_enabled: false  # Phase 59完了: Stacking無効化（PE方式が+12-25%高収益）
  meta_learner:
    type: "lightgbm"       # Meta-Learnerモデルタイプ
    params:
      num_leaves: 15       # 軽量設定（過学習防止）
      learning_rate: 0.05  # 控えめな学習率
      n_estimators: 50     # 少なめのツリー数
      max_depth: 4         # 浅いツリー（Meta-Learner用）
      random_state: 42
      class_weight: "balanced"  # クラス不均衡対策

# ========================================
# 📈 MLモデル設定（ML Model Settings）
# ========================================
# LightGBM・XGBoost・RandomForestハイパーパラメータ
# ========================================
models:
  lgbm:
    num_leaves: 31
    learning_rate: 0.05
    n_estimators: 100
    feature_fraction: 0.9
    bagging_fraction: 0.8
    bagging_freq: 5
    max_depth: -1
    min_child_samples: 20
    reg_alpha: 0.0
    reg_lambda: 0.0
  min_training_samples: 10
  rf:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    max_features: sqrt
    bootstrap: true
    oob_score: true
    class_weight: balanced
  xgb:
    max_depth: 6
    learning_rate: 0.05
    n_estimators: 100
    min_child_weight: 1
    subsample: 0.8
    colsample_bytree: 0.8
    alpha: 0
    lambda: 1
    gamma: 0

# ========================================
# 📊 レポート設定（Reporting Settings）
# ========================================
reporting:
  base_dir: logs/reports
  paper_trading_dir: logs/paper_trading_reports

# ========================================
# ⚖️ リスク管理設定（Risk Management Settings）
# ========================================
# Kelly基準・ドローダウン・資金管理設定
# Phase 51.5-C: TP/SL価格差異バグ修正（ticker価格 vs limit価格・ATR取得失敗対応）
# ========================================
risk:
  emergency_ratio: 0.005
  emergency_stop_ratio: 0.98
  fallback_max_ratio: 0.1
  fallback_min_ratio: 0.01
  fallback_stop_ratio: 0.95
  kelly_lookback_days: 30
  kelly_max_fraction: 1.00   # Phase 57.7: Kelly最大ポジション比率（initial_position_sizeと整合）
  recent_lookback_hours: 24
  safe_balance_ratio: 0.3
  max_capital_usage: 1.5     # Phase 60.1: 0.5→1.5（実効レバレッジ0.5倍移行）
  reserve_ratio: 0.5         # Phase 57: 0.7 → 0.5（reserve 50%）

  # Phase 51.5-C: TP/SL再計算フォールバック設定
  # Phase 62.13: 500000→120000に修正（BTC 1400万円時の妥当なATR値）
  fallback_atr: 120000                   # ATR取得失敗時のフォールバックATR値
  require_tpsl_recalculation: true       # TP/SL再計算必須化（false時は元のTP/SL使用）

# ========================================
# 📈 ポジション管理設定（Position Management Settings）
# ========================================
# Phase 51.6完了（被害最小化・こまめ利確）:
#   - SL 0.7%・TP 0.9%・RR比1.29:1（Phase 51.6: 被害最小化・こまめ利確）
#   - Phase 46: 個別TP/SL実装（デイトレード特化・シンプル実装）
#   - Phase 49.18: 証拠金維持率80%確実遵守（critical: 100.0 → 80.0変更）
#   - Phase 50.5: SL注文保護（クリーンアップ機能一時無効化）
# ========================================
position_management:
  # Phase 46: 個別TP/SL実装（Phase 42統合TP/SL削除済み）
  min_account_balance: 10000
  max_open_positions: 3
  max_daily_trades: 50
  cooldown_minutes: 15
  min_trade_size: 0.0001
  max_position_ratio_per_trade:
    # Phase 60.1: 実効レバレッジ0.5倍移行（約3倍引き上げ）
    low_confidence: 0.80    # Phase 60.1: 0.25→0.80
    medium_confidence: 1.00  # Phase 60.1: 0.35→1.00
    high_confidence: 1.50    # Phase 60.1: 0.50→1.50
    enforce_minimum: true
  dynamic_position_sizing:
    enabled: true
    # Phase 60.1: 実効レバレッジ0.5倍移行（約3倍引き上げ）
    low_confidence:
      min_ratio: 0.30    # Phase 60.1: 0.10→0.30
      max_ratio: 0.60    # Phase 60.1: 0.20→0.60
    medium_confidence:
      min_ratio: 0.45    # Phase 60.1: 0.15→0.45
      max_ratio: 0.75    # Phase 60.1: 0.25→0.75
    high_confidence:
      min_ratio: 0.60    # Phase 60.1: 0.20→0.60
      max_ratio: 1.05    # Phase 60.1: 0.35→1.05
  account_size_adjustments:
    small:
      threshold: 50000
      min_trade_override: true
    medium:
      threshold: 100000
      position_multiplier: 1.0
    large:
      threshold: 100001
      position_multiplier: 1.0
  emergency_stop_loss:
    enable: true
    price_change_threshold: 0.03
    time_window_minutes: 5
    max_loss_threshold: 0.05
    override_cooldown: true
    min_hold_minutes: 1
  take_profit:
    enabled: true
    default_ratio: 1.29              # Phase 51.6: RR比1.29:1（TP 0.9% / SL 0.7%）
    min_profit_ratio: 0.009          # Phase 51.6: TP 0.9%（こまめ利確・maker手数料込み1.1%利益）
    override_strategy_tp: false
    position_partial_exit: false
    # ========================================
    # Phase 61.3: TP注文タイプ設定
    # ========================================
    # use_native_type: true → bitbank API直接呼び出し（type="take_profit"）
    #                        → UIで「利確」と表示される
    # use_native_type: false → 従来のlimit注文（type="limit"）
    #                        → UIで「指値」と表示される
    # ========================================
    use_native_type: true

    # ========================================
    # Phase 62.10: TP Maker戦略設定
    # ========================================
    # 目的: TP決済でMaker約定（-0.02%リベート）を狙う
    # 効果: 決済手数料 0.12% → -0.02%（0.14%削減）
    # 制限: bitbank APIでtake_profitタイプはpost_only非対応のため、
    #       limit + post_onlyで代替実装
    # ========================================
    maker_strategy:
      enabled: true                      # TP Maker戦略有効化
      max_retries: 2                     # 最大リトライ回数（TPは速度優先）
      retry_interval_ms: 300             # リトライ間隔（ミリ秒）
      timeout_seconds: 10                # タイムアウト（秒）- TPは短め
      fallback_to_native: true           # 失敗時take_profitタイプにフォールバック

    # ========================================
    # Phase 61.7: 固定金額TP設定
    # ========================================
    # 目的: %ベースではなく固定金額（純利益）でTPを設定
    # 計算式: 必要含み益 = 目標純利益 + エントリー手数料 + 利息 - 決済リベート
    # ========================================
    fixed_amount:
      enabled: true                     # 固定金額TPモード有効化
      target_net_profit: 500            # Phase 61完了: 500円が最適
      include_entry_fee: true           # エントリー手数料を考慮
      include_exit_fee_rebate: true     # 決済リベートを考慮
      include_interest: true            # 利息を考慮
      fallback_entry_fee_rate: 0.0     # Phase 62.19: Maker 0%
      fallback_exit_fee_rate: 0.0      # Phase 62.19: TP決済 Maker 0%

    # ========================================
    # Phase 52.0: レジーム別TP設定
    # ========================================
    # 目的: 市場レジームに応じたTP最適化
    #   - tight_range: TP 0.8%（頻繁利確・93.9%発生率対応）
    #   - normal_range: TP 1.0%（標準利確）
    #   - trending: TP 1.5%（大きく伸ばす）
    # 期待効果: 勝率46.1%→50%+、取引毎リターン+219%
    # ========================================
    regime_based:
      enabled: true
      tight_range:
        min_profit_ratio: 0.004      # Phase 58.5: 0.8%→0.4%（利息対策・短期決済）
        weekend_ratio: 0.0025        # Phase 58.6: 土日 TP 0.25%（ATR65%対応）
        default_ratio: 1.33
        fixed_amount_target: 500     # Phase 61完了: 500円が最適
      normal_range:
        min_profit_ratio: 0.010      # TP 1.0%（RR比1.43:1）
        weekend_ratio: 0.0065        # Phase 58.6: 土日 TP 0.65%
        default_ratio: 1.43
        fixed_amount_target: 500     # Phase 61完了: 500円が最適
      trending:
        min_profit_ratio: 0.015      # TP 1.5%（RR比1.50:1）
        weekend_ratio: 0.010         # Phase 58.6: 土日 TP 1.0%
        default_ratio: 1.50
        fixed_amount_target: 500     # Phase 61完了: 500円が最適
      high_volatility:
        min_profit_ratio: 0.020      # TP 2.0%（参考値・実際はエントリーなし）
        default_ratio: 1.33
        fixed_amount_target: 500     # Phase 61完了: 500円が最適
  stop_loss:
    enabled: true
    # Phase 59.6: SL指値化設定（手数料削減）
    # Phase 62.14: スリッページバッファ拡大（約定確実性向上）
    order_type: "stop_limit"         # "stop"（成行）or "stop_limit"（指値）※use_native_type=false時のみ
    slippage_buffer: 0.002           # Phase 62.14: 0.1%→0.2%（約定確実性向上）
    # Phase 62.17: stop_limit未約定バグ修正
    stop_limit_timeout: 300          # stop_limitタイムアウト（秒）- 5分
    skip_bot_monitoring: true        # Bot側SL監視スキップ（bitbankトリガーに任せる）
    default_atr_multiplier: 2.0
    max_loss_ratio: 0.007            # Phase 51.6: SL 0.7%（被害最小化・1回約11円損失）
    override_strategy_sl: false
    enable_trailing: false
    execution_slippage: 0.003

    # ========================================
    # Phase 61.3: SL注文タイプ設定
    # Phase 62.14: 逆指値指値化（スリッページ対策）
    # ========================================
    # use_native_type: true → bitbank API直接呼び出し（type="stop_loss"）
    #                        → UIで「損切り」と表示される（成行決済）
    # use_native_type: false → stop_limit注文（指値）
    #                        → UIで「逆指値」と表示される（指値決済）
    # Phase 62.14: false推奨（スリッページ抑制、slippage_buffer 0.2%で約定確実性確保）
    # ========================================
    use_native_type: false

    # ========================================
    # Phase 61.3: 決済注文の約定確認設定
    # ========================================
    # 決済注文発行後、約定を確認する
    # ========================================
    fill_confirmation:
      enabled: true                  # 約定確認機能ON
      timeout_seconds: 30            # 約定待機タイムアウト
      check_interval_seconds: 3      # 約定確認間隔

    # ========================================
    # Phase 61.3: 未約定時リトライ設定
    # ========================================
    # 決済注文が未約定の場合、価格を調整してリトライする
    # ========================================
    retry_on_unfilled:
      enabled: true                  # リトライ機能ON
      max_retries: 3                 # 最大リトライ回数
      slippage_increase_per_retry: 0.001  # リトライ毎のスリッページ増加（0.1%）

    # ========================================
    # Phase 52.0: レジーム別SL設定
    # ========================================
    # 目的: 市場レジームに応じたSL最適化
    #   - tight_range: SL 0.6%（損失最小化・レンジ相場特化）
    #   - normal_range: SL 0.7%（標準損切り）
    #   - trending: SL 1.0%（トレンド継続余地確保）
    # 期待効果: 平均損失-12円→-10円（-17%改善）
    # ========================================
    regime_based:
      enabled: true
      tight_range:
        max_loss_ratio: 0.004        # Phase 62.15: 0.3%→0.4%（SL発動率低下・勝率改善）
        weekend_ratio: 0.0025        # Phase 62.15: 0.2%→0.25%（平日比62.5%維持）
      normal_range:
        max_loss_ratio: 0.007        # SL 0.7%（RR比1.43:1）
        weekend_ratio: 0.0045        # Phase 58.6: 土日 SL 0.45%
      trending:
        max_loss_ratio: 0.010        # SL 1.0%（RR比1.50:1）
        weekend_ratio: 0.0065        # Phase 58.6: 土日 SL 0.65%
      high_volatility:
        max_loss_ratio: 0.015        # SL 1.5%（参考値・実際はエントリーなし）

    adaptive_atr:
      enabled: true
      use_15m_timeframe: true
      volatility_lookback: 20
      low_volatility:
        threshold_ratio: 0.7
        multiplier: 2.5
      normal_volatility:
        multiplier: 2.0
      high_volatility:
        threshold_ratio: 1.3
        multiplier: 1.5
    min_distance:
      enabled: true
      ratio: 0.007               # Phase 51.6: SL 0.7%に合わせて変更
      override_atr: false
      min_atr_multiplier: 1.5
    trailing:
      enabled: false
      activation_profit: 0.02
      trailing_percent: 0.03
      min_update_distance: 200
      min_profit_lock: 0.005
      cancel_tp_when_exceeds: true

  # ========================================
  # Phase 58.6: 土日TP/SL調整設定
  # ========================================
  # 根拠: 半年間のCSV分析（2025/7-12）
  #   - 土日ATR: 平日の65%
  #   - 土日レンジ: 平日の60%
  #   - 0.40%到達率: 平日15.2%→土日7.0%（46%低下）
  # 対策: 土日はTP/SLを62.5%に縮小
  # ========================================
  weekend_adjustment:
    enabled: true
    reduction_factor: 0.625          # 土日は平日の62.5%

# ========================================
# 💰 証拠金管理設定（Margin Management Settings）
# ========================================
# Phase 49.18完了: 維持率80%確実遵守（critical: 100.0 → 80.0変更）
# ========================================
margin:
  position_value_estimation_ratio: 0.8
  # 維持率閾値（80%確実遵守）
  thresholds:
    critical: 80.0
    warning: 100.0
    caution: 150.0
    safe: 200.0
  large_drop_threshold: 50.0
  min_position_value: 1000.0
  max_ratio_cap: 10000.0

# ========================================
# 📝 注文実行設定（Order Execution Settings）
# ========================================
# Phase 38.7.2完了: 完全指値オンリー実装（100%指値注文）
# ========================================
order_execution:
  smart_order_enabled: true
  high_confidence_threshold: 0.0
  low_confidence_threshold: -1.0
  max_spread_ratio_for_limit: 0.005
  price_improvement_ratio: 0.0002
  entry_price_strategy: unfavorable
  guaranteed_execution_premium: 0.0005
  limit_order_timeout:
    enabled: true
    timeout_minutes: 5
    fallback_to_market: true
    max_price_deviation: 0.05
    check_interval_seconds: 60

  # === Phase 62.9: Maker戦略設定 ===
  maker_strategy:
    enabled: true                      # Maker戦略有効化
    max_retries: 5                     # Phase 65.2: 3→5（リトライ回数増加）
    retry_interval_ms: 200             # Phase 65.2: 500→200（高速リトライ）
    timeout_seconds: 30                # タイムアウト（秒）
    price_adjustment_tick: 1           # 価格調整単位（1円）
    max_price_adjustment_ratio: 0.001  # 最大価格調整率（0.1%）
    fallback_to_taker: true            # タイムアウト時Takerフォールバック
    disable_on_high_volatility: true   # 高ボラティリティ時無効化
    volatility_threshold: 0.02         # ボラティリティ閾値（2%）
    min_spread_for_maker: 0.00002      # 最小スプレッド（0.002%≒約200円）

# ========================================
# 🔔 残高アラート設定（Balance Alert Settings）
# ========================================
balance_alert:
  enabled: true
  min_required_margin: 14000.0
  alert_threshold_ratio: 1.2
  check_interval_minutes: 3

