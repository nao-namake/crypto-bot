strategy_system_version: 2.0.0
mode: paper
mode_balances:
  paper:
    initial_balance: 500000.0
    description: ペーパートレード用初期残高（50万円）
  live:
    initial_balance: 500000.0
    description: ライブトレード用初期残高（50万円）
  backtest:
    initial_balance: 500000.0
    description: バックテスト用初期残高（50万円）
exchange:
  name: bitbank
  symbol: BTC/JPY                # alias（既存 70 箇所参照との後方互換）
  # Phase 89-δ: マルチペア基盤の最小実装（primary_symbol を新設・既存 symbol は維持）
  primary_symbol: BTC/JPY
  auxiliary_symbols:
    - ETH/JPY                    # BTC-ETH 相関特徴量用
  leverage: 1.0
  rate_limit_ms: 35000              # 内部 rate limiter のバースト保護間隔（35秒）
  # Phase 88 M2: ccxt の Bitbank rateLimit パラメータ（リクエスト間最低待機 ms）。
  # bitbank 公式上限 5req/sec → 200ms (= 5 req/sec) で安全マージン無し、
  # 余裕を持たせるなら 250ms (= 4 req/sec) 推奨。
  ccxt_rate_limit_ms: 200
  timeout_ms: 120000
  retries: 5
  ssl_verify: true
  api_version: v1
data:
  timeframes:
  - 15m
  - 4h
  since_hours: 96
  limit: 100
  cache_enabled: true
  cache:
    enabled: true
    ttl_minutes: 5
    max_size: 1000
    disk_cache: true
    retention_days: 90
features:
  cache:
    enabled: true
    max_size: 200
    ttl_seconds: 600
    log_interval_cycles: 100
  # Phase 89-β: external features (Funding Rate / Fear & Greed / Macro)
  external_api:
    enabled: true
    binance_funding_url: https://fapi.binance.com/fapi/v1/fundingRate
    fear_greed_url: https://api.alternative.me/fng/
    timeout_seconds: 5
    cache_ttl_seconds: 300
    fallback_on_error: 0.0
cloud_run:
  memory: 768Mi  # Phase 88 I4 で 1Gi → 768Mi に削減（512Mi で OOM 即発生・768Mi が下限）
  cpu: 1
  min_instances: 0  # Phase 88 I3: Cloud Scheduler /trigger 駆動（CI workflow MIN_INSTANCES="0" と整合）
  max_instances: 2
  concurrency: 1
  timeout_seconds: 3600
security:
  secret_management: gcp_secret_manager
  workload_identity: true
trading_constraints:
  exchange: bitbank
  trading_type: margin
  leverage_max: 2.0
  leverage_actual: 1.0
  currency_pair: BTC/JPY
  default_order_type: limit
  initial_capital: 10000
  target_capital: 500000
  features_count: 55
  timeframes:
  - 15m
  - 4h
execution:
  backtest_period_days: 180
  backtest_use_fixed_dates: true
  backtest_start_date: '2025-07-01'
  backtest_end_date: '2025-12-31'
  live_mode_interval_seconds: 300
  paper_mode_interval_seconds: 300
  mode: paper
  order:
    default_type: limit
    slippage_tolerance: 0.001
    max_retry: 3
    retry_delay: 1.0
  latency:
    target_ms: 1000
    warning_ms: 500
    critical_ms: 2000
production:
  min_order_size: 0.0001
  max_order_size: 0.15
  trade_interval: 300
  margin_trading: true
  force_margin_mode: true
position_integrator:
  kelly_weight: 0.0
  dynamic_weight: 1.0
  risk_manager_weight: 0.0
position_sizing:
  mode: fixed
  fixed_table:
    low: 0.01
    medium: 0.015
    high: 0.02
  confidence_thresholds:
    medium_min: 0.5
    high_min: 0.65
backtest:
  log_level: WARNING
  data_limit: 10000
  progress_interval: 100
  report_interval: 10000
  mock_api_calls: true
  enable_detailed_logging: false
  fast_data_slicing: true
  data_sampling_ratio: 1.0
  inner_loop_count: 1
market_regime:
  tight_range:
    bb_width_threshold: 0.02
    price_range_threshold: 0.012
    max_ema_slope: 0.0008
  trending:
    adx_threshold: 20
    ema_slope_threshold: 0.0007
  normal_range:
    bb_width_threshold: 0.05
    adx_threshold: 22
  high_volatility:
    atr_ratio_threshold: 0.018
ml:
  # Phase 73-D: MLモード（quality_filter=メタラベリング品質判定, direction=旧方向予測）
  # quality_filterモードでは下記strategy_integration/regime_ml_integrationは無視される
  mode: quality_filter
  quality_filter:
    enabled: true
    # Phase 82: 再学習後モデル(TP 0.43%/SL 0.37%)分布に合わせ閾値再調整
    # 実データ検証結果: モデル平均p(1)=0.50, std=0.10, p(1)>=0.58で通過率21.9%
    accept_threshold: 0.58  # Phase 82: 0.65→0.58（新モデル分布で通過率~22%）
    reject_threshold: 0.42  # Phase 82: 0.45→0.42（リジェクト率~21%）
    uncertain_penalty: 0.5  # 中間帯50%縮小（維持）
    # Phase 84: 旧trading_cycle_manager.pyハードコード0.55を yaml化+0.65に緩和
    # 失敗予測の確信度閾値: ml_pred=0 かつ max(p)>=この値で「確信失敗」とみなしHOLD化
    # Phase 85 注記: TP/SLがレジーム別になったため採算ライン勝率もレジーム別:
    #   tight (TP1500/SL2000、名目RR 0.75:1、実RR 0.81:1) → 採算ライン勝率 55%
    #   normal (TP500/SL1500、名目RR 0.33:1、実RR 0.16:1) → 採算ライン勝率 86%
    # tight中心の運用なので閾値0.65のままで失敗確率65%超のみ拒否（過剰防衛回避）
    high_confidence_failure_threshold: 0.65
    # Phase 87 Stage 3 H6: レジーム別品質フィルタ閾値（採算ライン勝率に応じた差別化）
    # ルックアップ: regime_thresholds.<regime>.<key> → quality_filter.<key>（フォールバック）
    # 未定義レジーム（high_volatility 等）は global 値を継承
    regime_thresholds:
      tight_range:
        accept_threshold: 0.55   # 採算55%↑のため厳格化（0.58→0.55）
        reject_threshold: 0.45
        high_confidence_failure_threshold: 0.60
      normal_range:
        # Stage 3-R B: 0.85→0.75 緩和（7.7倍厳格化は過剰。本番24h観測で再調整）
        accept_threshold: 0.75
        reject_threshold: 0.40
        high_confidence_failure_threshold: 0.70
      trending:
        accept_threshold: 0.50   # Phase 85 でエントリー停止だが将来復活時のため定義
        reject_threshold: 0.40
        high_confidence_failure_threshold: 0.60
  # Phase 87 Stage 2-R4: ML サーキットブレーカー閾値（C4 MLHealthMonitor）
  health:
    consecutive_failure_threshold: 3  # 連続 N 回 predict/predict_proba 失敗で EMERGENCY_STOP 候補
  # Phase 89 NB1-NB5: N-BEATS hyperparam（完全版実装で uniform 予測問題を解消）
  # Phase 90: macOS Apple Silicon で PyTorch ハング多発のため epoch 削減 + log_every 短縮
  nbeats:
    n_epochs: 50               # Phase 90: 200→50 削減（macOS ハング回避・CV F1 0.855 達成済みで余地少）
    patience: 10               # Phase 90: 20→10 削減（Early Stop 早期発動）
    hidden_size: 64            # ネットワーク幅
    learning_rate: 0.001       # Adam lr
    batch_size: 64
    log_every: 5               # Phase 90: 10→5 短縮（ハング検出を早める）
  # Phase 89-β / 89 H9: 特徴量分布 Drift 検出（KS テスト + Bonferroni 補正）
  # Phase 90γ-①/②/③/③.1: 構造的バグ修正
  #   1. exclude_features: 時系列で変動する特徴量を網羅除外
  #      Phase 90γ-③ で 14→40 個に拡張、Phase 90γ-③.1 で 40→59 個に拡張（オシレーター漏れ対応）
  #   2. reference_reset_hours: reference 分布を定期 reset（古い分布との永続乖離防止）
  #   3. significant_feature_min: Phase 90γ-③ で 10→5（除外後の特徴量数減少に合わせ緩和）
  #   4. enable_auto_retraining: Phase 90γ-③ で false に変更（ダミー PAT で 401 ループ防止）
  drift:
    window_size: 200                    # reference 分布のサンプル数
    ks_alpha: 0.01                      # 全体有意水準（Bonferroni で 1/n に補正される）
    consecutive_threshold: 3            # 連続何サイクル drift で emergency_stop 候補
    retrain_cooldown_hours: 24          # Auto Retraining のクールダウン（Phase 89-γ H10）
    significant_feature_min: 5          # Phase 90γ-③: 10→5（exclude_features 拡張で残数減少）
    enable_auto_retraining: false       # Phase 90γ-③: PAT 未発行・ダミー値で 401 防止のため false
    # Phase 90γ-①: reference 分布の定期 reset（古い reference との永続乖離を防止）
    # 7 日 = 168 時間。0 にすると reset 無効化（旧挙動）
    reference_reset_hours: 168
    # Phase 90γ-①/③: drift 比較から除外する特徴量（時系列変動するもの）
    # 名前は src/features/feature_generator.py で実生成される列名と照合済
    exclude_features:
      # Phase 90γ-①（既存・OHLCV/BB/EMA/ATR/Donchian/MACD signal-histogram）
      - open
      - high
      - low
      - close
      - volume
      - bb_upper
      - bb_lower
      - ema_20
      - ema_50
      - atr_14
      - donchian_high_20
      - donchian_low_20
      - macd_signal
      - macd_histogram
      # Phase 90γ-③: 追加（GCP ログ実測で drift 検出された特徴量を網羅）
      # MACD 本体・interaction 系（価格スケール連動）
      - macd
      - macd_x_volume
      - close_x_atr
      - macd_lag_1
      # close 由来統計（価格レベル連動）
      - close_ma_10
      - close_ma_20
      - close_std_5
      - close_std_10
      - close_std_20
      # volume 由来統計（取引量レベル連動）
      - volume_ema
      # 時刻系（reference 取得タイミングで分布シフトする可能性）
      - hour
      - hour_cos
      - day_of_week
      - day_sin
      # 外部 API 系（時系列で大きく変動）
      - funding_rate_8h_avg
      - fear_greed_index
      - btc_realized_vol_24h
      - btc_funding_premium
      - btc_dominance_change
      - usdjpy_change
      - nikkei_change_proxy
      # VPIN/HMM 系（時系列 MA + 状態遷移）
      - vpin
      - vpin_ma20
      - vpin_change
      - hmm_state_bear_prob
      - hmm_state_bull_prob
      # cross_asset（相関は時系列で変動）
      - eth_btc_price_ratio
      - eth_btc_corr_24h
      - eth_returns_15m
      # Phase 90γ-③.1: オシレーター系（正規化済み相対値・24h 実測で漏れ発覚）
      # rsi_14: 0-100 / adx/di: 0-100 / cci: ±100 自己正規化 / cmf: -1〜+1
      # bb_position / channel_position: 0-1 正規化済み相対位置
      - rsi_14
      - rsi_lag_1
      - adx_14
      - plus_di_14
      - minus_di_14
      - cci_20
      - cmf_20
      - bb_position
      - channel_position
      # volume ラグ系（macd_lag_1 と同種）
      - volume_lag_1
      - volume_lag_2
      - volume_lag_3
      # 価格 returns 系（close_std 系と同種・実測で 1 件観測）
      - returns_1
      - returns_2
      - returns_3
      - returns_10
  ensemble_enabled: true
  ensemble_weights:
    lightgbm: 0.3
    xgboost: 0.3
    random_forest: 0.4
  models:
  - lgbm
  - xgb
  - rf
  fallback_enabled: true
  prediction:
    lookback_periods: 100
    retrain_frequency: weekly
  confidence_threshold: 0.3
  allow_dummy_fallback: false
  default_confidence: 0.5
  # 以下はmode=directionの場合のみ使用。mode=quality_filterでは無視される
  strategy_integration:
    enabled: true
    ml_weight: 0.35
    strategy_weight: 0.7
    high_confidence_threshold: 0.6
    agreement_bonus: 1.2
    disagreement_penalty: 0.95
    min_ml_confidence: 0.32
    hold_conversion_threshold: 0.15
    min_strategy_confidence: 0.22
    ml_signal_recovery:
      enabled: true
      min_ml_confidence: 0.5
      min_individual_confidence: 0.3
      recovery_confidence_cap: 0.35
  regime_ml_integration:
    enabled: true
    tight_range:
      min_ml_confidence: 0.38
      high_confidence_threshold: 0.55
      ml_weight: 0.15
      strategy_weight: 0.85
      agreement_bonus: 1.25
      disagreement_penalty: 0.7
    normal_range:
      min_ml_confidence: 0.35
      high_confidence_threshold: 0.55
      ml_weight: 0.2
      strategy_weight: 0.8
      agreement_bonus: 1.25
      disagreement_penalty: 0.7
    trending:
      min_ml_confidence: 0.38
      high_confidence_threshold: 0.55
      ml_weight: 0.35
      strategy_weight: 0.65
      agreement_bonus: 1.25
      disagreement_penalty: 0.88
    high_volatility:
      min_ml_confidence: 0.8
      high_confidence_threshold: 0.9
      ml_weight: 0.1
      strategy_weight: 0.9
      agreement_bonus: 1.1
      disagreement_penalty: 0.85
  dynamic_confidence:
    base_hold: 0.35
    error_fallback: 0.25
    ml_fallback: 0.35
    neutral_default: 0.4
    strategy_fallback: 0.35
    market_uncertainty:
      volatility_factor_max: 0.1
      volatility_divisor: 1.0
      volume_factor_max: 0.06
      volume_multiplier: 0.2
      price_factor_max: 0.04
      uncertainty_max: 0.2
      uncertainty_boost: 1.0
    strategies:
      cmf_reversal:
        reversal_base: 0.5
        reversal_min: 0.3
        reversal_max: 0.7
        hold_base: 0.4
        hold_min: 0.35
        hold_max: 0.6
        volume_bonus_max: 0.1
        volume_multiplier: 0.2
      adx_trend:
        strong_base: 0.65
        strong_min: 0.4
        strong_max: 0.85
        moderate_base: 0.5
        moderate_min: 0.35
        moderate_max: 0.7
        weak_base: 0.35
        weak_min: 0.25
        weak_max: 0.5
        hold_base: 0.45
        hold_min: 0.35
        hold_max: 0.6
        default_min: 0.25
        default_max: 0.6
        adx_bonus_max: 0.25
        adx_divisor: 25
        di_bonus_max: 0.15
        di_divisor: 12
        volume_bonus_max: 0.1
        volume_multiplier: 0.15
      atr_based:
        high_volatility_base: 0.55
        high_volatility_min: 0.35
        high_volatility_max: 0.8
        normal_volatility_base: 0.45
        normal_volatility_min: 0.3
        normal_volatility_max: 0.65
        low_volatility_base: 0.35
        low_volatility_min: 0.25
        low_volatility_max: 0.5
        rsi_base: 0.2
        rsi_multiplier: 0.3
        agreement_max: 0.85
        weak_base: 0.08
        weak_multiplier: 0.1
        volatility_bonus: 1.02
        volatility_max: 0.85
        position_size_base: 0.015
        market_stress_threshold: 0.7
        min_atr_ratio: 0.5
        strength_divisor: 0.2
        strength_normalize: 30.0
  emergency_stop_on_dummy: true
  max_model_failures: 3
  prediction_fallback_confidence: 0.0
  dummy_confidence: 0.5
  model_paths:
    base_path: /app
    local_path: .
    training_path: models/training
performance:
  default_latency_ms: 100.0
dynamic_strategy_selection:
  enabled: true
  trend_filter:
    enabled: true
    ema_slope_threshold: 0.002
    counter_trend_penalty: 0.5
    strong_trend_multiplier: 2.0
    strong_trend_block: true
    di_confirmation_enabled: false
    di_spread_threshold: 5
  regime_strategy_mapping:
    tight_range:
      ATRBased: 0.35
      CMFReversal: 0.20
      BBReversal: 0.20
      StochasticReversal: 0.10
      ADXTrendStrength: 0.10
      MACDEMACrossover: 0.05
    normal_range:
      ATRBased: 0.25
      CMFReversal: 0.15
      BBReversal: 0.15
      StochasticReversal: 0.15
      ADXTrendStrength: 0.15
      MACDEMACrossover: 0.15
    # Phase 85: trending時は全戦略無効化（過去30日全シナリオ赤字、設計思想「レンジ専用」に合致）
    trending:
      ADXTrendStrength: 0.0
      MACDEMACrossover: 0.0
      ATRBased: 0.0
      CMFReversal: 0.0
      StochasticReversal: 0.0
      BBReversal: 0.0
    high_volatility:
      ATRBased: 0.0
      BBReversal: 0.0
      CMFReversal: 0.0
      StochasticReversal: 0.0
      ADXTrendStrength: 0.0
      MACDEMACrossover: 0.0
position_limits:
  tight_range:
    max_positions: 6
  normal_range:
    max_positions: 4
  trending:
    max_positions: 2
  high_volatility:
    max_positions: 0
  fallback_max_positions: 2
  reject_on_limit: true
strategies:
  adx_trend:
    enabled: true
    class_name: ADXTrendStrength
    module_path: src.strategies.implementations.adx_trend
    strategy_type: adx_trend
    weight: 0.1
    priority: 3
    regime_affinity: range
    di_crossover_threshold: 0.5
    di_weak_signal_confidence: 0.35
    hold_confidence: 0.12
    min_confidence: 0.25
    moderate_trend_max: 25
    moderate_trend_min: 15
    strong_trend_threshold: 22
    weak_di_threshold: 0.8
    weak_trend_threshold: 15
    range_mode_enabled: true
    range_adx_threshold: 20
    use_rsi_driven_mode: true
    rsi_oversold_trigger: 40
    rsi_overbought_trigger: 60
    bb_lower_trigger: 0.3
    bb_upper_trigger: 0.7
    range_signal_confidence: 0.4
    rsi_extreme_bonus: 0.1
    bb_extreme_bonus: 0.05
    adx_falling_bonus: 0.05
    di_reversal_threshold: 3.0
    di_diff_threshold: 5.0
    di_divergence_threshold: 12.0
    use_di_divergence: false
    # Phase 84: 強トレンド継続中のDI差順張りエントリー（DIクロス不要）
    # Phase 85: trending時はレジーム全戦略0.0で停止する方針のため、ADX閾値を999に上げて実質無効化
    # （コードは残置、将来的にPhase 86で削除予定）
    strong_trend_continuation_adx: 999
    strong_trend_continuation_di_diff: 8.0
    strong_trend_continuation_confidence: 0.5
  atr_based:
