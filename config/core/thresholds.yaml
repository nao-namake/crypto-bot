        min_profit_ratio: 0.01
        weekend_ratio: 0.0065
        default_ratio: 1.43
        fixed_amount_target: 500
      trending:
        min_profit_ratio: 0.015
        weekend_ratio: 0.01
        default_ratio: 1.5
        fixed_amount_target: 500
      high_volatility:
        min_profit_ratio: 0.02
        default_ratio: 1.33
        fixed_amount_target: 500
