    regime_affinity: range
    exhaustion_threshold: 0.7
    high_exhaustion_threshold: 0.85
    adx_range_threshold: 25
    rsi_upper: 60
    rsi_lower: 40
    rsi_confirmation_bonus: 0.05
    min_confidence: 0.35
    hold_confidence: 0.10
    base_confidence: 0.4
    high_confidence: 0.6
    min_score_threshold: 0.65
    bb_position_enabled: true
