    backtest_exit_rate: 0.001
  capital_allocation_limit: 500000.0
  anomaly:
    spread_critical_threshold: 0.005
    spread_warning_threshold: 0.003
  ask_spread_ratio: 1.001
  bid_spread_ratio: 0.999
  confidence_levels:
    high: 0.45
    low: 0.2
    medium: 0.3
    min_ml: 0.12
    very_high: 0.6
  fallback_btc_jpy: 16500000.0
  fallback_prices:
    ask: 16600000.0
    bid: 16400000.0
    default_ask: 16100000.0
    default_bid: 15900000.0
  kelly_criterion:
    min_trades_for_kelly: 5
    max_position_ratio: 1.0
    safety_factor: 0.9
  min_trade_size: 0.0001
  initial_position_size: 0.015
  fee_rate: 0.001
  minimum_live_balance: 3000
  position_sizing:
    max_position_ratio: 1.0
    stop_loss_atr_multiplier: 1.2
    take_profit_ratio: 2.0
  risk_thresholds:
    conditional: 0.65
    deny: 0.85
    min_ml_confidence: 0.12
  stats_log_interval: 10
ensemble:
  max_nan_ratio_features: 0.5
  max_nan_ratio_target: 0.3
  min_training_samples: 50
  stacking_enabled: false
  meta_learner:
    type: lightgbm
    params:
      num_leaves: 15
      learning_rate: 0.05
      n_estimators: 50
      max_depth: 4
      random_state: 42
      class_weight: balanced
models:
  lgbm:
    num_leaves: 31
    learning_rate: 0.05
    n_estimators: 100
    feature_fraction: 0.9
    bagging_fraction: 0.8
    bagging_freq: 5
    max_depth: -1
    min_child_samples: 20
    reg_alpha: 0.0
    reg_lambda: 0.0
  min_training_samples: 10
  rf:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    max_features: sqrt
    bootstrap: true
    oob_score: true
    class_weight: balanced
  xgb:
    max_depth: 6
    learning_rate: 0.05
    n_estimators: 100
    min_child_weight: 1
    subsample: 0.8
    colsample_bytree: 0.8
    alpha: 0
    lambda: 1
    gamma: 0
reporting:
