# MLモデル自動再学習ワークフロー
# 週次自動実行（日曜18:00 JST）・Phase 53.8完了（55特徴量・3クラス分類・Python 3.11）・GCP gVisor互換性

name: ML Model Training

on:
  # push実行防止（GitHub内部バリデーション対策）
  push:
    paths-ignore:
      - '**'  # すべてのファイル変更を無視（push時は実行しない）

  # 手動実行（推奨）
  workflow_dispatch:
    inputs:
      n_trials:
        description: 'Optuna最適化試行回数'
        required: true
        default: '50'
        type: choice
        options:
          - '50'   # 推奨（約4分・コスパ最良）
          - '100'  # 高精度（約8分・+1-3%改善）
          - '30'   # 高速テスト用
      dry_run:
        description: 'ドライラン実行（モデル保存なし）'
        required: false
        default: false
        type: boolean

  # 週次自動実行（日曜18:00 JST = 日曜09:00 UTC）
  schedule:
    - cron: '0 9 * * 0'  # UTC 09:00 = JST 18:00（日曜日）

env:
  PROJECT_ID: my-crypto-bot-project
  REGION: asia-northeast1
  SERVICE_NAME: crypto-bot-service-prod
  # Phase 52.4: ハードコード値を環境変数化
  N_TRIALS_DEFAULT: '50'
  WORKFLOW_TIMEOUT: 30
  MIN_FEATURE_COUNT: 50
  TRAINING_LOG_PATH: /tmp/training.log
  PUSH_RETRY_COUNT: 3
  PUSH_RETRY_DELAY: 5
  LOG_TAIL_LINES: 50

jobs:
  model-training:
    name: ML Model Training & Deployment
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(vars.WORKFLOW_TIMEOUT || env.WORKFLOW_TIMEOUT) }}

    # mainブランチのみ実行
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Phase 53.8: Python 3.11安定化・GCP gVisor互換性
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          echo "🔧 Python環境セットアップ"
          python --version
          pip --version

          python -m pip install --upgrade pip
          pip install -r requirements.txt

          echo "✅ 依存関係インストール完了"

      - name: Pre-training Environment Setup
        run: |
          echo "🚀 モデル学習環境セットアップ"

          # 必要なディレクトリ作成
          mkdir -p models/{production,training,archive} logs cache

          # Git設定（コミット用）
          git config --global user.name "GitHub Actions ML Training"
          git config --global user.email "actions@github.com"

          echo "✅ 環境セットアップ完了"

      - name: Execute ML Model Training
        id: training
        run: |
          N_TRIALS=${{ github.event.inputs.n_trials || env.N_TRIALS_DEFAULT }}
          DRY_RUN=${{ github.event.inputs.dry_run || 'false' }}

          echo "🎯 Phase 53.8: MLモデル学習実行（Python 3.11・55特徴量システム）"
          echo "📊 Optuna試行回数: ${N_TRIALS}"
          echo "📊 3クラス分類（SELL/HOLD/BUY）・55特徴量（49基本+6戦略シグナル）"
          echo "📊 閾値: ±0.5%・Optunaハイパーパラメータ最適化"
          echo "📊 訓練対象: ensemble_full.pkl (55特徴量・デフォルト) + ensemble_basic.pkl (49特徴量・フォールバック)"
          echo "📊 ドライランモード: ${DRY_RUN}"

          # 統合運用ガイド準拠の標準コマンド使用（Phase 52.4: 重複削除）
          python3 scripts/ml/create_ml_models.py \
            --n-classes 3 \
            --threshold 0.005 \
            --optimize \
            --n-trials "$N_TRIALS" \
            --verbose \
            2>&1 | tee ${{ env.TRAINING_LOG_PATH }}

          # 学習成功確認
          if [ $? -eq 0 ]; then
            echo "training_success=true" >> $GITHUB_OUTPUT
            echo "✅ モデル学習完了"
          else
            echo "training_success=false" >> $GITHUB_OUTPUT
            echo "❌ モデル学習失敗"
            exit 1
          fi

      - name: Model Validation
        if: github.event.inputs.dry_run != 'true' && steps.training.outputs.training_success == 'true'
        run: |
          echo "🔍 モデル品質検証開始"

          # 1. ファイル存在確認（両モデル・Phase 51.5-E対応）
          if [ ! -f "models/production/ensemble_full.pkl" ]; then
            echo "❌ モデルファイル不存在: ensemble_full.pkl"
            exit 1
          fi

          if [ ! -f "models/production/ensemble_basic.pkl" ]; then
            echo "❌ モデルファイル不存在: ensemble_basic.pkl"
            exit 1
          fi

          if [ ! -f "models/production/production_model_metadata.json" ]; then
            echo "❌ メタデータファイル不存在: production_model_metadata.json"
            exit 1
          fi

          echo "✅ モデルファイル存在確認完了（ensemble_full.pkl・ensemble_basic.pkl）"

          # 2. メタデータ検証
          MODEL_TYPE=$(python3 -c "
          import json
          import sys
          try:
              metadata = json.load(open('models/production/production_model_metadata.json'))
              print(metadata.get('model_type', 'unknown'))
          except Exception as e:
              print(f'error: {e}', file=sys.stderr)
              sys.exit(1)
          ")

          if [ "$MODEL_TYPE" != "ProductionEnsemble" ]; then
            echo "❌ モデルタイプ不正: $MODEL_TYPE != ProductionEnsemble"
            exit 1
          fi

          echo "✅ モデルタイプ検証完了: ProductionEnsemble"

          # 3. 特徴量検証（柔軟な検証・将来の特徴量数変更に対応）
          FEATURE_COUNT=$(python3 -c "
          import json
          import sys
          try:
              metadata = json.load(open('models/production/production_model_metadata.json'))
              feature_names = metadata.get('feature_names', [])
              print(len(feature_names))
          except Exception as e:
              print(f'error: {e}', file=sys.stderr)
              sys.exit(1)
          ")

          # 特徴量数が妥当な範囲か確認（最小値チェックのみ・将来の拡張に対応）
          if [ "$FEATURE_COUNT" -lt "${{ env.MIN_FEATURE_COUNT }}" ]; then
            echo "❌ 特徴量数不足: $FEATURE_COUNT < ${{ env.MIN_FEATURE_COUNT }}（最小${{ env.MIN_FEATURE_COUNT }}特徴量必要）"
            exit 1
          fi

          echo "✅ 特徴量検証完了: ${FEATURE_COUNT}特徴量（Phase 53.8: 55特徴量）"

          # 4. モデルサイズ確認（両モデル）
          FULL_SIZE=$(du -h models/production/ensemble_full.pkl | awk '{print $1}')
          BASIC_SIZE=$(du -h models/production/ensemble_basic.pkl | awk '{print $1}')
          echo "📊 モデルサイズ: full=${FULL_SIZE}, basic=${BASIC_SIZE}"

          echo "✅ モデル品質検証完了"

      - name: Commit New Models
        if: github.event.inputs.dry_run != 'true' && steps.training.outputs.training_success == 'true'
        id: commit
        run: |
          echo "📝 モデル自動バージョン管理・コミット"

          # 変更確認
          if git diff --quiet models/ && git diff --staged --quiet models/; then
            echo "📋 モデル変更なし - コミットスキップ"
            echo "commit_created=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # モデルバージョン取得
          MODEL_VERSION=$(python3 -c "
          import json
          try:
              metadata = json.load(open('models/production/production_model_metadata.json'))
              created_at = metadata.get('created_at', 'unknown')
              print(f'ML_{created_at[:10]}')
          except:
              print('ML_auto')
          " 2>/dev/null || echo "ML_auto")

          # Gitステージング
          git add models/production/ models/training/

          # アーカイブ存在時追加
          if ls models/archive/*.pkl 1> /dev/null 2>&1; then
            git add models/archive/
          fi

          # コミット作成
          git commit -m "feat: ${MODEL_VERSION} モデル自動更新（週次再学習）" \
            -m "" \
            -m "- 55特徴量Strategy-Aware ML再学習完了（49基本+6戦略シグナル）" \
            -m "- 3クラス分類（SELL/HOLD/BUY）・閾値±0.5%" \
            -m "- Optuna最適化（${{ github.event.inputs.n_trials || env.N_TRIALS_DEFAULT }}試行）" \
            -m "- ProductionEnsembleアンサンブル（LightGBM/XGBoost/RandomForest・n_jobs=1）" \
            -m "- 自動バージョン管理・アーカイブ実行" \
            -m "- Python 3.11環境（GCP gVisor互換性）" \
            -m "" \
            -m "🤖 Generated with [Claude Code](https://claude.com/claude-code)" \
            -m "" \
            -m "Co-Authored-By: Claude <noreply@anthropic.com>"

          echo "commit_created=true" >> $GITHUB_OUTPUT
          echo "✅ モデル自動コミット完了"

      - name: Push Updated Models
        if: github.event.inputs.dry_run != 'true' && steps.commit.outputs.commit_created == 'true'
        run: |
          echo "🚀 更新モデルプッシュ"

          # プッシュ実行（リトライ付き）
          MAX_RETRIES=${{ env.PUSH_RETRY_COUNT }}
          for i in $(seq 1 $MAX_RETRIES); do
            if git push origin main; then
              echo "✅ モデル更新プッシュ完了"
              exit 0
            else
              echo "⚠️ プッシュ失敗（試行 $i/$MAX_RETRIES）"
              sleep ${{ env.PUSH_RETRY_DELAY }}
            fi
          done

          echo "❌ プッシュ失敗（${MAX_RETRIES}回リトライ）"
          exit 1

      - name: Trigger Production Deployment
        if: github.event.inputs.dry_run != 'true' && steps.commit.outputs.commit_created == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: model-updated

      - name: Training Summary Report
        if: always()
        run: |
          echo "📊 === MLモデル学習サマリー ==="
          echo "実行時間: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "実行タイプ: ${{ github.event_name }}"
          echo "Optuna試行回数: ${{ github.event.inputs.n_trials || env.N_TRIALS_DEFAULT }}"
          echo "ドライラン: ${{ github.event.inputs.dry_run || 'false' }}"
          echo "学習成功: ${{ steps.training.outputs.training_success || 'unknown' }}"
          echo "コミット作成: ${{ steps.commit.outputs.commit_created || 'false' }}"

          if [ -f "models/production/production_model_metadata.json" ]; then
            echo ""
            echo "🎯 新モデル詳細:"
            python3 -c "
import json
try:
    metadata = json.load(open('models/production/production_model_metadata.json'))
    print(f'  モデルタイプ: {metadata.get(\"model_type\", \"unknown\")}')
    print(f'  特徴量数: {len(metadata.get(\"feature_names\", []))}')
    print(f'  作成日時: {metadata.get(\"created_at\", \"unknown\")}')
    print(f'  ステータス: {metadata.get(\"status\", \"unknown\")}')

    # パフォーマンスメトリクス
    perf = metadata.get('performance_metrics', {})
    if perf:
        print(f'  F1スコア（LightGBM）: {perf.get(\"lightgbm\", {}).get(\"test_f1\", \"N/A\")}')
        print(f'  F1スコア（XGBoost）: {perf.get(\"xgboost\", {}).get(\"test_f1\", \"N/A\")}')
        print(f'  F1スコア（RandomForest）: {perf.get(\"random_forest\", {}).get(\"test_f1\", \"N/A\")}')
except Exception as e:
    print(f'  メタデータ読み取りエラー: {e}')
            "
          fi

          echo ""
          echo "📈 Phase 53.8完了: 55特徴量Strategy-Aware ML・6戦略統合・3クラス分類・Optuna最適化・Python 3.11環境"
          echo "✅ モデル定期学習: ${{ job.status == 'success' && '完了' || '失敗' }}"

      - name: Training Failure Alert
        if: failure()
        run: |
          echo "🚨 ========================================="
          echo "🚨 警告: モデル学習が失敗しました"
          echo "🚨 既存モデルが継続使用されます"
          echo "🚨 手動確認・修正が必要です"
          echo "🚨 ========================================="

          # 学習ログ出力（デバッグ用）
          if [ -f "${{ env.TRAINING_LOG_PATH }}" ]; then
            echo ""
            echo "📋 学習ログ（最後の${{ env.LOG_TAIL_LINES }}行）:"
            tail -${{ env.LOG_TAIL_LINES }} ${{ env.TRAINING_LOG_PATH }}
          fi

# 注意事項:
# 1. 週次自動実行: 毎週日曜18:00 JST（UTC 09:00）
# 2. 手動実行推奨: n_trials調整可能（50推奨・100高精度・30テスト用）
# 3. ドライランモード: モデル保存なしでテスト可能
# 4. Phase 53.8完了: 55特徴量（49基本+6戦略シグナル）・3クラス分類・Python 3.11・Optuna最適化
# 5. 実行時間: 約4-8分（50-100 trials）
# 6. RandomForest設定: n_jobs=1（GCP gVisor互換性・99%稼働率目標）
