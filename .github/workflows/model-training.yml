# MLモデル自動再学習ワークフロー
# 週次自動実行（日曜18:00 JST）・Phase 52.2整理
# - データ収集ステップ追加（180日分）
# - MIN_FEATURE_COUNT環境変数追加
# - Python 3.13維持（Phase 52.1ベース）
# - pushトリガー完全除外（Phase 58.4）: if条件でevent_nameチェック

name: ML Model Training

on:
  # 手動実行（推奨）
  workflow_dispatch:
    inputs:
      n_trials:
        description: 'Optuna最適化試行回数'
        required: true
        default: '50'
        type: choice
        options:
          - '30'   # 高速テスト用
          - '50'   # 推奨（約4分・コスパ最良）
          - '100'  # 高精度（約8分・+1-3%改善）
      dry_run:
        description: 'ドライラン実行（モデル保存なし）'
        required: false
        default: false
        type: boolean

  # 週次自動実行（日曜18:00 JST = 日曜09:00 UTC）
  schedule:
    - cron: '0 9 * * 0'

env:
  PROJECT_ID: my-crypto-bot-project
  REGION: asia-northeast1
  SERVICE_NAME: crypto-bot-service-prod
  MIN_FEATURE_COUNT: 50

jobs:
  model-training:
    name: ML Model Training & Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # scheduleまたはworkflow_dispatchのみ実行（pushトリガー完全除外）
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup directories
        run: |
          mkdir -p models/{production,training,archive} logs cache src/backtest/data/historical
          git config --global user.name "GitHub Actions ML Training"
          git config --global user.email "actions@github.com"

      - name: Collect training data
        run: |
          echo "📊 180日分データ収集"
          python3 src/backtest/scripts/collect_historical_csv.py --days 180 --symbol BTC/JPY
          ls -lh src/backtest/data/historical/

      - name: Execute ML Model Training
        id: training
        run: |
          N_TRIALS=${{ github.event.inputs.n_trials || '50' }}
          DRY_RUN=${{ github.event.inputs.dry_run || 'false' }}

          echo "🎯 モデル学習開始（${N_TRIALS}試行）"
          echo "📊 37特徴量・メタラベリング"

          if [ "$DRY_RUN" = "true" ]; then
            echo "🧪 ドライランモード"
          fi

          python3 scripts/ml/create_ml_models.py \
            --n-classes 3 \
            --threshold 0.005 \
            --use-smote \
            --optimize \
            --n-trials "$N_TRIALS" \
            --verbose

          if [ $? -eq 0 ]; then
            echo "training_success=true" >> $GITHUB_OUTPUT
            echo "✅ モデル学習完了"
          else
            echo "training_success=false" >> $GITHUB_OUTPUT
            echo "❌ モデル学習失敗"
            exit 1
          fi

      - name: Model Validation
        if: github.event.inputs.dry_run != 'true' && steps.training.outputs.training_success == 'true'
        run: |
          echo "🔍 モデル検証"

          # ファイル存在確認
          if [ ! -f "models/production/ensemble_full.pkl" ]; then
            echo "❌ ensemble_full.pkl不存在"
            exit 1
          fi

          if [ ! -f "models/production/ensemble_basic.pkl" ]; then
            echo "❌ ensemble_basic.pkl不存在"
            exit 1
          fi

          # 特徴量検証
          FEATURE_COUNT=$(python3 -c "
          import json
          m = json.load(open('models/production/production_model_metadata.json'))
          print(len(m.get('feature_names', [])))
          ")

          if [ "$FEATURE_COUNT" -lt "${{ env.MIN_FEATURE_COUNT }}" ]; then
            echo "❌ 特徴量不足: $FEATURE_COUNT < ${{ env.MIN_FEATURE_COUNT }}"
            exit 1
          fi

          echo "✅ 検証完了: ${FEATURE_COUNT}特徴量"

      - name: Commit and Push
        if: github.event.inputs.dry_run != 'true' && steps.training.outputs.training_success == 'true'
        id: commit
        run: |
          if git diff --quiet models/ && git diff --staged --quiet models/; then
            echo "📋 モデル変更なし"
            echo "commit_created=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git add models/production/ models/training/

          git commit -m "feat: MLモデル自動更新（週次再学習）" \
            -m "" \
            -m "- 37特徴量メタラベリングML再学習" \
            -m "- 3クラス分類（SELL/HOLD/BUY）・閾値±0.5%" \
            -m "- Optuna最適化（${{ github.event.inputs.n_trials || '50' }}試行）" \
            -m "" \
            -m "🤖 Generated with [Claude Code](https://claude.com/claude-code)" \
            -m "" \
            -m "Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin main
          echo "commit_created=true" >> $GITHUB_OUTPUT
          echo "✅ モデル更新プッシュ完了"

      - name: Trigger Production Deployment
        if: github.event.inputs.dry_run != 'true' && steps.commit.outputs.commit_created == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: model-updated

      - name: Training Summary
        if: always()
        run: |
          echo "📊 === サマリー ==="
          echo "実行: ${{ github.event_name }}"
          echo "試行: ${{ github.event.inputs.n_trials || '50' }}"
          echo "ドライラン: ${{ github.event.inputs.dry_run || 'false' }}"
          echo "成功: ${{ steps.training.outputs.training_success || 'unknown' }}"

          if [ -f "models/production/production_model_metadata.json" ]; then
            echo ""
            echo "🎯 モデル詳細:"
            python3 -c "
          import json
          try:
              m = json.load(open('models/production/production_model_metadata.json'))
              print(f'  特徴量数: {len(m.get(\"feature_names\", []))}')
              print(f'  作成日時: {m.get(\"created_at\", \"unknown\")}')
          except Exception as e:
              print(f'  読み取りエラー: {e}')
          "
          fi

      - name: Training Failure Alert
        if: failure()
        run: |
          echo "🚨 警告: モデル学習失敗"
          echo "🚨 既存モデルが継続使用されます"

# 注意事項:
# 1. 週次自動実行: 毎週日曜18:00 JST（UTC 09:00）
# 2. 手動実行推奨: n_trials調整可能（50推奨・100高精度・30テスト用）
# 3. ドライランモード: モデル保存なしでテスト可能
# 4. Phase 52.2整理: データ収集ステップ追加・MIN_FEATURE_COUNT環境変数
# 5. 実行時間: 約4-8分（50-100 trials）・タイムアウト30分
# 6. Phase 58.4: pushイベント完全除外（if条件でevent_nameチェック）
